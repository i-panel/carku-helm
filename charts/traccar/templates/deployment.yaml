# ============================================================
# Carku main deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "carku.fullname" . }}
  labels:
    {{- include "carku.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "carku.selectorLabels" . | nindent 6 }}
  {{- with .Values.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.configOverride }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "carku.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "carku.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "carku.fullname" . }}
        {{- if and .Values.h2.enabled .Values.h2.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "carku.fullname" . }}-data
        {{- end }}
{{- if or .Values.mysql.enabled .Values.postgresql.enabled (index .Values "redis-ha").enabled .Values.initContainers .Values.optimization.sysctl.enabled }}
      initContainers:
{{- if .Values.optimization.sysctl.enabled }}
{{- /* 
  Init container to tune kernel parameters. Requires privileged access.
  کانتینر اولیه برای تنظیم پارامترهای هسته. نیازمند دسترسی ویژه.
*/}}
        - name: sysctl
          image: "busybox:latest"
          securityContext:
            privileged: true
          command:
            - "sh"
            - "-c"
            - |
              sysctl -w vm.max_map_count={{ .Values.optimization.sysctl.maxMapCount }}
              sysctl -w fs.file-max={{ .Values.optimization.sysctl.fileMax }}
              sysctl -w net.ipv4.ip_local_port_range="{{ .Values.optimization.sysctl.portRange }}"
{{- end }}
{{- if .Values.mysql.enabled }}
        - name: wait-for-mysql
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "alpine:3.19"
          command:
            - 'sh'
            - '-c'
            - >-
              until nc -z -w 2 {{ include "carku.fullname" . }}-mysql 3306 && echo mysql ok;
                do sleep 2;
              done
{{- end }}
{{- if .Values.postgresql.enabled }}
        - name: wait-for-postgresql
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "alpine:3.19"
          command:
            - 'sh'
            - '-c'
            - >-
              until nc -z -w 2 {{ include "carku.fullname" . }}-postgresql 5432 && echo postgresql ok;
                do sleep 2;
              done
{{- end }}
{{- if (index .Values "redis-ha").enabled }}
        - name: wait-for-redis
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "alpine:3.19"
          command:
            - 'sh'
            - '-c'
            - >-
              until nc -z -w 2 {{ include "carku.fullname" . }}-redis-ha-haproxy 6379 && echo redis ok;
                do sleep 2;
              done
{{- end }}
{{- with .Values.initContainers }}
        {{- if eq (typeOf .) "string" }}
        {{- tpl . $ | nindent 8 }}
        {{- else }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
{{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "carku.image" . }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if not .Values.configOverride }}
          envFrom:
            - secretRef:
                name: {{ include "carku.fullname" . }}
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
            {{- range .Values.externalService.protocolPorts }}
            - name: {{ .name }}
              containerPort: {{ .targetPort }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
          - name: "config"
            subPath: "carku.xml"
            mountPath: "/opt/carku/conf/carku.xml"
          {{- if and .Values.h2.enabled .Values.h2.persistence.enabled }}
          - name: "data"
            mountPath: "/opt/carku/data"
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

{{- if and .Values.nominatim.enabled .Values.nominatim.stable.enabled }}
---
# ============================================================
# Nominatim stable deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "carku.fullname" . }}-nominatim
  labels:
    {{- include "carku.labels" . | nindent 4 }}
    app: nominatim
    track: stable
spec:
  replicas: {{ .Values.nominatim.stable.replicas }}
  selector:
    matchLabels:
      {{- include "carku.selectorLabels" . | nindent 6 }}
      app: nominatim
      track: stable
  template:
    metadata:
      labels:
        {{- include "carku.selectorLabels" . | nindent 8 }}
        app: nominatim
        track: stable
    spec:
      {{- with .Values.nominatim.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: nominatim-k8s
        image: "{{ .Values.nominatim.image.repository }}:{{ .Values.nominatim.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.nominatim.image.pullPolicy }}
        env:
        - name: NOMINATIM_MODE
          value: RESTORE
        - name: NOMINATIM_DATA_LABEL
          valueFrom:
            configMapKeyRef:
              name: {{ include "carku.fullname" . }}-nominatim-config
              key: DATA_LABEL
        - name: NOMINATIM_AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "carku.fullname" . }}-nominatim-storage-secret
              key: access-key-id
        - name: NOMINATIM_AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "carku.fullname" . }}-nominatim-storage-secret
              key: secret-access-key
        - name: NOMINATIM_AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: {{ include "carku.fullname" . }}-nominatim-config
              key: AWS_REGION
        - name: NOMINATIM_S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: {{ include "carku.fullname" . }}-nominatim-config
              key: S3_BUCKET
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /search
            port: 8080
          initialDelaySeconds: 30
          timeoutSeconds: 1
        resources:
          {{- toYaml .Values.nominatim.resources | nindent 10 }}
{{- end }}

