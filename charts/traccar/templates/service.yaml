{{- $fullName := include "carku.fullname" . -}}
{{- $externalfullname := printf "external-%s" $fullName -}}

# Service for Carku web UI
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "carku.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "carku.selectorLabels" . | nindent 4 }}

{{- if .Values.externalService.enabled -}}
---
# External Service for device protocols (LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: {{ $externalfullname }}
  labels:
    {{- include "carku.labels" . | nindent 4 }}
  {{- with .Values.externalService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.externalService.type }}
{{- if .Values.externalService.loadBalancerIP }}
  loadBalancerIP: {{ .Values.externalService.loadBalancerIP }}
{{- end }}
{{- if .Values.externalService.loadBalancerSourceRanges }}
  loadBalancerSourceRanges: {{ toYaml .Values.externalService.loadBalancerSourceRanges | nindent 4 }}
{{- end }}
{{- if hasKey .Values.externalService "allocateLoadBalancerNodePorts" }}
  allocateLoadBalancerNodePorts: {{ .Values.externalService.allocateLoadBalancerNodePorts }}
{{- end }}
  ports:
    {{- toYaml .Values.externalService.protocolPorts | nindent 4 }}
  selector:
    {{- include "carku.selectorLabels" . | nindent 4 }}
{{- end }}

{{- if .Values.nominatim.enabled }}
---
# Service for Nominatim (internal)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "carku.fullname" . }}-nominatim
  labels:
    {{- include "carku.labels" . | nindent 4 }}
    app: nominatim
spec:
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    {{- include "carku.selectorLabels" . | nindent 4 }}
    app: nominatim
{{- end }}