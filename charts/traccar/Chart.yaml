apiVersion: v2
name: carku-helm
description: A Helm chart for Carku GPS Server
type: application
version: 1.9.0
appVersion: "5.10"
dependencies:
  - name: mysql
    version: 9.4.8
    repository: https://charts.bitnami.com/bitnami
    condition: mysql.enabled
  - name: postgresql
    version: 15.5.21
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis-ha
    version: 4.23.0
    repository: https://dandydeveloper.github.io/charts
    condition: redis-ha.enabled
maintainers:
  - email: borhan.d@gmail.com
    name: Borhan
