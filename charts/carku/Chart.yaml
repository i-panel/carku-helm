apiVersion: v2
name: carku
description: A Helm chart for Carku GPS Server
type: application
version: 1.10.0
appVersion: "6.14"
dependencies:
  - name: mysql
    version: 9.4.8
    repository: https://charts.bitnami.com/bitnami
    condition: mysql.enabled
  - name: postgresql
    version: 18.7.2
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis-ha
    version: 4.23.0
    repository: https://dandydeveloper.github.io/charts
    condition: redis-ha.enabled
maintainers:
  - email: borhan.d@gmail.com
    name: Borhan
