apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "carku.fullname" . }}
  labels:
{{- include "carku.labels" . | nindent 4 }}
data:
  carku.xml: |
{{- if .Values.configOverride }}
{{- .Values.configOverride | nindent 4 }}
{{- else }}
    <?xml version='1.0' encoding='UTF-8'?>
    <!DOCTYPE properties SYSTEM 'http://java.sun.com/dtd/properties.dtd'>
    <properties>
        <entry key='config.default'>./conf/default.xml</entry>
        <entry key='config.useEnvironmentVariables'>true</entry>

{{- if .Values.carku.server }}
{{- if .Values.carku.server.bufferingThreshold }}
        <entry key='server.buffering.threshold'>{{ .Values.carku.server.bufferingThreshold }}</entry>
{{- end }}
{{- if .Values.carku.server.timeout }}
        <entry key='server.timeout'>{{ .Values.carku.server.timeout }}</entry>
{{- end }}
{{- if .Values.carku.server.delayAcknowledgement }}
        <entry key='server.delayAcknowledgement'>{{ .Values.carku.server.delayAcknowledgement }}</entry>
{{- end }}
{{- if .Values.carku.server.nettyBossThreads }}
        <entry key='server.nettyBossThreads'>{{ .Values.carku.server.nettyBossThreads }}</entry>
{{- end }}
{{- if .Values.carku.server.nettyThreads }}
        <entry key='server.nettyThreads'>{{ .Values.carku.server.nettyThreads }}</entry>
{{- end }}
{{- if .Values.carku.server.statistics }}
        <entry key='server.statistics'>{{ .Values.carku.server.statistics }}</entry>
{{- end }}
{{- if .Values.carku.server.forward }}
        <entry key='server.forward'>{{ .Values.carku.server.forward }}</entry>
{{- end }}
{{- if .Values.carku.server.forwardConnectTimeout }}
        <entry key='server.forward.connectTimeout'>{{ .Values.carku.server.forwardConnectTimeout }}</entry>
{{- end }}
{{- if .Values.carku.server.forwardWriteTimeout }}
        <entry key='server.forward.writeTimeout'>{{ .Values.carku.server.forwardWriteTimeout }}</entry>
{{- end }}
{{- end }}

{{- if .Values.carku.web }}
{{- if .Values.carku.web.address }}
        <entry key='web.address'>{{ .Values.carku.web.address }}</entry>
{{- end }}
{{- if .Values.carku.web.port }}
        <entry key='web.port'>{{ .Values.carku.web.port }}</entry>
{{- end }}
{{- if .Values.carku.web.path }}
        <entry key='web.path'>{{ .Values.carku.web.path }}</entry>
{{- end }}
{{- if .Values.carku.web.override }}
        <entry key='web.override'>{{ .Values.carku.web.override }}</entry>
{{- end }}
{{- if .Values.carku.web.debug }}
        <entry key='web.debug'>{{ .Values.carku.web.debug }}</entry>
{{- end }}
{{- if .Values.carku.web.console }}
        <entry key='web.console'>{{ .Values.carku.web.console }}</entry>
{{- end }}
{{- if .Values.carku.web.timeout }}
        <entry key='web.timeout'>{{ .Values.carku.web.timeout }}</entry>
{{- end }}
{{- if .Values.carku.web.sessionTimeout }}
        <entry key='web.sessionTimeout'>{{ .Values.carku.web.sessionTimeout }}</entry>
{{- end }}
{{- if .Values.carku.web.origin }}
        <entry key='web.origin'>{{ .Values.carku.web.origin }}</entry>
{{- end }}
{{- if .Values.carku.web.cacheControl }}
        <entry key='web.cacheControl'>{{ .Values.carku.web.cacheControl }}</entry>
{{- end }}
{{- if .Values.carku.web.localizationPath }}
        <entry key='web.localizationPath'>{{ .Values.carku.web.localizationPath }}</entry>
{{- end }}
{{- if .Values.carku.web.requestLogPath }}
        <entry key='web.requestLog.path'>{{ .Values.carku.web.requestLogPath }}</entry>
{{- end }}
{{- if .Values.carku.web.requestLogRetainDays }}
        <entry key='web.requestLog.retainDays'>{{ .Values.carku.web.requestLogRetainDays }}</entry>
{{- end }}
{{- if .Values.carku.web.disableHealthCheck }}
        <entry key='web.disableHealthCheck'>{{ .Values.carku.web.disableHealthCheck }}</entry>
{{- end }}
{{- if .Values.carku.web.healthCheckDropThreshold }}
        <entry key='web.healthCheck.dropThreshold'>{{ .Values.carku.web.healthCheckDropThreshold }}</entry>
{{- end }}
{{- if .Values.carku.web.sameSiteCookie }}
        <entry key='web.sameSiteCookie'>{{ .Values.carku.web.sameSiteCookie }}</entry>
{{- end }}
{{- if .Values.carku.web.persistSession }}
        <entry key='web.persistSession'>{{ .Values.carku.web.persistSession }}</entry>
{{- end }}
{{- if .Values.carku.web.url }}
        <entry key='web.url'>{{ .Values.carku.web.url }}</entry>
{{- end }}
{{- if .Values.carku.web.showUnknownDevices }}
        <entry key='web.showUnknownDevices'>{{ .Values.carku.web.showUnknownDevices }}</entry>
{{- end }}
{{- if .Values.carku.web.shareDeviceCommands }}
        <entry key='web.shareDevice.commands'>{{ .Values.carku.web.shareDeviceCommands }}</entry>
{{- end }}
{{- if .Values.carku.web.shareDeviceReports }}
        <entry key='web.shareDevice.reports'>{{ .Values.carku.web.shareDeviceReports }}</entry>
{{- end }}
{{- if .Values.carku.web.mcpEnable }}
        <entry key='web.mcp.enable'>{{ .Values.carku.web.mcpEnable }}</entry>
{{- end }}
{{- end }}

{{- if .Values.carku.geocoder }}
{{- if .Values.carku.geocoder.enable }}
        <entry key='geocoder.enable'>true</entry>
{{- else }}
        <entry key='geocoder.enable'>false</entry>
{{- end }}
{{- if .Values.carku.geocoder.type }}
        <entry key='geocoder.type'>{{ .Values.carku.geocoder.type }}</entry>
{{- end }}
{{- if .Values.carku.geocoder.url }}
        <entry key='geocoder.url'>{{ .Values.carku.geocoder.url }}</entry>
{{- end }}
{{- if .Values.carku.geocoder.language }}
        <entry key='geocoder.language'>{{ .Values.carku.geocoder.language }}</entry>
{{- end }}
{{- if .Values.carku.geocoder.format }}
        <entry key='geocoder.format'>{{ .Values.carku.geocoder.format }}</entry>
{{- end }}
{{- if .Values.carku.geocoder.cacheSize }}
        <entry key='geocoder.cacheSize'>{{ .Values.carku.geocoder.cacheSize }}</entry>
{{- end }}
{{- if .Values.carku.geocoder.ignorePositions }}
        <entry key='geocoder.ignorePositions'>true</entry>
{{- else }}
        <entry key='geocoder.ignorePositions'>false</entry>
{{- end }}
{{- if .Values.carku.geocoder.reuseDistance }}
        <entry key='geocoder.reuseDistance'>{{ .Values.carku.geocoder.reuseDistance }}</entry>
{{- end }}
{{- if .Values.carku.geocoder.onRequest }}
        <entry key='geocoder.onRequest'>true</entry>
{{- else }}
        <entry key='geocoder.onRequest'>false</entry>
{{- end }}
{{- end }}

{{- if .Values.carku.geolocation }}
{{- if .Values.carku.geolocation.enable }}
        <entry key='geolocation.enable'>true</entry>
{{- else }}
        <entry key='geolocation.enable'>false</entry>
{{- end }}
{{- if .Values.carku.geolocation.type }}
        <entry key='geolocation.type'>{{ .Values.carku.geolocation.type }}</entry>
{{- end }}
{{- if .Values.carku.geolocation.url }}
        <entry key='geolocation.url'>{{ .Values.carku.geolocation.url }}</entry>
{{- end }}
{{- if .Values.carku.geolocation.processInvalidPositions }}
        <entry key='geolocation.processInvalidPositions'>true</entry>
{{- else }}
        <entry key='geolocation.processInvalidPositions'>false</entry>
{{- end }}
{{- if .Values.carku.geolocation.reuse }}
        <entry key='geolocation.reuse'>true</entry>
{{- else }}
        <entry key='geolocation.reuse'>false</entry>
{{- end }}
{{- if .Values.carku.geolocation.requireWifi }}
        <entry key='geolocation.requireWifi'>true</entry>
{{- else }}
        <entry key='geolocation.requireWifi'>false</entry>
{{- end }}
{{- if .Values.carku.geolocation.mcc }}
        <entry key='geolocation.mcc'>{{ .Values.carku.geolocation.mcc }}</entry>
{{- end }}
{{- if .Values.carku.geolocation.mnc }}
        <entry key='geolocation.mnc'>{{ .Values.carku.geolocation.mnc }}</entry>
{{- end }}
{{- end }}

    <!-- Filter settings -->
{{- if .Values.carku.filter.enable }}
        <entry key='filter.enable'>true</entry>
{{- if .Values.carku.filter.invalid }}
        <entry key='filter.invalid'>true</entry>
{{- else }}
        <entry key='filter.invalid'>false</entry>
{{- end }}
{{- if .Values.carku.filter.zero }}
        <entry key='filter.zero'>true</entry>
{{- else }}
        <entry key='filter.zero'>false</entry>
{{- end }}
{{- if .Values.carku.filter.duplicate }}
        <entry key='filter.duplicate'>true</entry>
{{- else }}
        <entry key='filter.duplicate'>false</entry>
{{- end }}
{{- if .Values.carku.filter.outdated }}
        <entry key='filter.outdated'>true</entry>
{{- else }}
        <entry key='filter.outdated'>false</entry>
{{- end }}
{{- if .Values.carku.filter.future }}
        <entry key='filter.future'>{{ .Values.carku.filter.future }}</entry>
{{- end }}
{{- if .Values.carku.filter.past }}
        <entry key='filter.past'>{{ .Values.carku.filter.past }}</entry>
{{- end }}
{{- if .Values.carku.filter.accuracy }}
        <entry key='filter.accuracy'>{{ .Values.carku.filter.accuracy }}</entry>
{{- end }}
{{- if .Values.carku.filter.approximate }}
        <entry key='filter.approximate'>true</entry>
{{- else }}
        <entry key='filter.approximate'>false</entry>
{{- end }}
{{- if .Values.carku.filter.static }}
        <entry key='filter.static'>true</entry>
{{- else }}
        <entry key='filter.static'>false</entry>
{{- end }}
{{- if .Values.carku.filter.distance }}
        <entry key='filter.distance'>{{ .Values.carku.filter.distance }}</entry>
{{- end }}
{{- if .Values.carku.filter.maxSpeed }}
        <entry key='filter.maxSpeed'>{{ .Values.carku.filter.maxSpeed }}</entry>
{{- end }}
{{- if .Values.carku.filter.minPeriod }}
        <entry key='filter.minPeriod'>{{ .Values.carku.filter.minPeriod }}</entry>
{{- end }}
{{- if .Values.carku.filter.dailyLimit }}
        <entry key='filter.dailyLimit'>{{ .Values.carku.filter.dailyLimit }}</entry>
{{- end }}
{{- if .Values.carku.filter.dailyLimitInterval }}
        <entry key='filter.dailyLimitInterval'>{{ .Values.carku.filter.dailyLimitInterval }}</entry>
{{- end }}
{{- if .Values.carku.filter.skipLimit }}
        <entry key='filter.skipLimit'>{{ .Values.carku.filter.skipLimit }}</entry>
{{- end }}
{{- if .Values.carku.filter.skipAttributes.enable }}
        <entry key='filter.skipAttributes.enable'>true</entry>
        <entry key='filter.skipAttributes'>{{ .Values.carku.filter.skipAttributes.attributes }}</entry>
{{- else }}
        <entry key='filter.skipAttributes.enable'>false</entry>
{{- end }}
{{- else }}
        <entry key='filter.enable'>false</entry>
{{- end }}

    <!-- Decoder settings -->
{{- if .Values.carku.decoder }}
{{- if .Values.carku.decoder.timezone }}
        <entry key='decoder.timezone'>{{ .Values.carku.decoder.timezone }}</entry>
{{- end }}
{{- end }}

    <!-- Device specific settings (non-sensitive) -->
{{- if .Values.carku.device }}
{{- if .Values.carku.device.fuelCapacity }}
        <entry key='fuelCapacity'>{{ .Values.carku.device.fuelCapacity }}</entry>
{{- end }}
{{- if .Values.carku.device.proximityEnterDistance }}
        <entry key='proximityEnterDistance'>{{ .Values.carku.device.proximityEnterDistance }}</entry>
{{- end }}
{{- if .Values.carku.device.proximityExitDistance }}
        <entry key='proximityExitDistance'>{{ .Values.carku.device.proximityExitDistance }}</entry>
{{- end }}
{{- if .Values.carku.device.unaccompaniedDistance }}
        <entry key='unaccompaniedDistance'>{{ .Values.carku.device.unaccompaniedDistance }}</entry>
{{- end }}
{{- if .Values.carku.device.disableShare }}
        <entry key='disableShare'>true</entry>
{{- else }}
        <entry key='disableShare'>false</entry>
{{- end }}
{{- end }}

    <!-- Command sender -->
{{- if .Values.carku.command }}
{{- if .Values.carku.command.sender }}
        <entry key='command.sender'>{{ .Values.carku.command.sender }}</entry>
{{- end }}
{{- end }}

    <!-- Suntech protocol settings -->
{{- if .Values.carku.suntech }}
{{- if .Values.carku.suntech.protocolType }}
        <entry key='suntech.protocolType'>{{ .Values.carku.suntech.protocolType }}</entry>
{{- end }}
{{- if .Values.carku.suntech.hbm }}
        <entry key='suntech.hbm'>{{ .Values.carku.suntech.hbm }}</entry>
{{- end }}
{{- end }}

    <!-- OsmAnd settings -->
{{- if .Values.carku.osmand }}
{{- if .Values.carku.osmand.minAccuracy }}
        <entry key='osmand.minAccuracy'>{{ .Values.carku.osmand.minAccuracy }}</entry>
{{- else }}
        <entry key='osmand.minAccuracy'>10.0</entry>
{{- end }}
{{- end }}

{{- if .Values.carku.distance }}
{{- if .Values.carku.distance.enable }}
        <entry key='distance.enable'>true</entry>
{{- else }}
        <entry key='distance.enable'>false</entry>
{{- end }}
{{- end }}

{{- if .Values.carku.logger }}
{{- if .Values.carku.logger.level }}
        <entry key='logger.level'>{{ lower .Values.carku.logger.level }}</entry>
        <entry key='logger.file'>/dev/stdout</entry>
        <entry key='logger.rotate'>false</entry>
{{- end }}
{{- if .Values.carku.logger.console }}
        <entry key='logger.console'>true</entry>
{{- else }}
        <entry key='logger.console'>false</entry>
{{- end }}
{{- if .Values.carku.logger.queries }}
        <entry key='logger.queries'>true</entry>
{{- else }}
        <entry key='logger.queries'>false</entry>
{{- end }}
{{- if .Values.carku.logger.fullStackTraces }}
        <entry key='logger.fullStackTraces'>true</entry>
{{- else }}
        <entry key='logger.fullStackTraces'>false</entry>
{{- end }}
{{- if .Values.carku.logger.decodeTextData }}
        <entry key='logger.decodeTextData'>true</entry>
{{- else }}
        <entry key='logger.decodeTextData'>false</entry>
{{- end }}
{{- if .Values.carku.logger.rotateInterval }}
        <entry key='logger.rotate.interval'>{{ .Values.carku.logger.rotateInterval }}</entry>
{{- end }}
{{- if .Values.carku.logger.attributes }}
        <entry key='logger.attributes'>{{ .Values.carku.logger.attributes }}</entry>
{{- end }}
{{- end }}

{{- if .Values.carku.processing.remoteAddress.enable }}
        <entry key='processing.remoteAddress.enable'>true</entry>
{{- else }}
        <entry key='processing.remoteAddress.enable'>false</entry>
{{- end }}
{{- if .Values.carku.processing.useLinkedDriver }}
        <entry key='processing.useLinkedDriver'>true</entry>
{{- else }}
        <entry key='processing.useLinkedDriver'>false</entry>
{{- end }}
{{- if .Values.carku.processing.copyAttributes.enable }}
        <entry key='processing.copyAttributes.enable'>true</entry>
{{- else }}
        <entry key='processing.copyAttributes.enable'>false</entry>
{{- end }}
{{- if .Values.carku.processing.copyAttributes.enable }}
{{- if .Values.carku.processing.copyAttributes.attributes }}
        <entry key='processing.copyAttributes'>{{ .Values.carku.processing.copyAttributes.attributes }}</entry>
{{- end }}
{{- end }}
{{- if .Values.carku.processing.computedAttributes }}
{{- if .Values.carku.processing.computedAttributes.deviceAttributes }}
        <entry key='processing.computedAttributes.deviceAttributes'>true</entry>
{{- else }}
        <entry key='processing.computedAttributes.deviceAttributes'>false</entry>
{{- end }}
{{- if .Values.carku.processing.computedAttributes.lastAttributes }}
        <entry key='processing.computedAttributes.lastAttributes'>true</entry>
{{- else }}
        <entry key='processing.computedAttributes.lastAttributes'>false</entry>
{{- end }}
{{- if .Values.carku.processing.computedAttributes.localVariables }}
        <entry key='processing.computedAttributes.localVariables'>true</entry>
{{- else }}
        <entry key='processing.computedAttributes.localVariables'>false</entry>
{{- end }}
{{- if .Values.carku.processing.computedAttributes.loops }}
        <entry key='processing.computedAttributes.loops'>true</entry>
{{- else }}
        <entry key='processing.computedAttributes.loops'>false</entry>
{{- end }}
{{- if .Values.carku.processing.computedAttributes.newInstanceCreation }}
        <entry key='processing.computedAttributes.newInstanceCreation'>true</entry>
{{- else }}
        <entry key='processing.computedAttributes.newInstanceCreation'>false</entry>
{{- end }}
{{- end }}

    <!-- Database settings (credentials from environment variables) -->
{{- if or .Values.carku.database .Values.mysql.enabled .Values.postgresql.enabled .Values.h2.enabled }}
{{- if .Values.mysql.enabled }}
        <entry key='database.driver'>com.mysql.cj.jdbc.Driver</entry>
        <entry key='database.url'>jdbc:mysql://{{ include "carku.fullname" . }}-mysql:3306/{{ .Values.mysql.auth.database }}?zeroDateTimeBehavior=round&amp;serverTimezone=UTC&amp;allowPublicKeyRetrieval=true&amp;useSSL=false&amp;allowMultiQueries=true&amp;autoReconnect=true&amp;useUnicode=yes&amp;characterEncoding=UTF-8&amp;sessionVariables=sql_mode=''</entry>
{{- else if .Values.postgresql.enabled }}
        <entry key='database.driver'>org.postgresql.Driver</entry>
        <entry key='database.url'>jdbc:postgresql://{{ include "carku.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}?ssl=false</entry>
{{- else }}
{{- if .Values.carku.database.driverFile }}
        <entry key='database.driverFile'>{{ .Values.carku.database.driverFile }}</entry>
{{- end }}
{{- if .Values.carku.database.driver }}
        <entry key='database.driver'>{{ .Values.carku.database.driver }}</entry>
{{- end }}
{{- if .Values.carku.database.url }}
        <entry key='database.url'>{{ .Values.carku.database.url }}</entry>
{{- end }}
{{- end }}
{{- end }}

{{- if .Values.carku.database }}
{{- if .Values.carku.database.memory }}
        <entry key='database.memory'>true</entry>
{{- else }}
        <entry key='database.memory'>false</entry>
{{- end }}
{{- if .Values.carku.database.changelog }}
        <entry key='database.changelog'>{{ .Values.carku.database.changelog }}</entry>
{{- end }}
{{- if .Values.carku.database.maxPoolSize }}
        <entry key='database.maxPoolSize'>{{ .Values.carku.database.maxPoolSize }}</entry>
{{- end }}
{{- if .Values.carku.database.checkConnection }}
        <entry key='database.checkConnection'>{{ .Values.carku.database.checkConnection }}</entry>
{{- end }}
{{- if .Values.carku.database.saveOriginal }}
        <entry key='database.saveOriginal'>true</entry>
{{- else }}
        <entry key='database.saveOriginal'>false</entry>
{{- end }}
{{- if .Values.carku.database.throttleUnknown }}
        <entry key='database.throttleUnknown'>true</entry>
{{- else }}
        <entry key='database.throttleUnknown'>false</entry>
{{- end }}
{{- if .Values.carku.database.registerUnknown }}
        <entry key='database.registerUnknown'>true</entry>
{{- else }}
        <entry key='database.registerUnknown'>false</entry>
{{- end }}
{{- if .Values.carku.database.registerUnknown.defaultCategory }}
        <entry key='database.registerUnknown.defaultCategory'>{{ .Values.carku.database.registerUnknown.defaultCategory }}</entry>
{{- end }}
{{- if .Values.carku.database.registerUnknown.defaultGroupId }}
        <entry key='database.registerUnknown.defaultGroupId'>{{ .Values.carku.database.registerUnknown.defaultGroupId }}</entry>
{{- end }}
{{- if .Values.carku.database.registerUnknown.regex }}
        <entry key='database.registerUnknown.regex'>{{ .Values.carku.database.registerUnknown.regex }}</entry>
{{- end }}
{{- if .Values.carku.database.positionPeriod }}
        <entry key='database.positionPeriod'>{{ .Values.carku.database.positionPeriod }}</entry>
{{- end }}
{{- if .Values.carku.database.saveEmpty }}
        <entry key='database.saveEmpty'>true</entry>
{{- else }}
        <entry key='database.saveEmpty'>false</entry>
{{- end }}
{{- if .Values.carku.database.maxLifetime }}
        <entry key='database.maxLifetime'>{{ .Values.carku.database.maxLifetime }}</entry>
{{- end }}
{{- if .Values.carku.database.positionBatchInterval }}
        <entry key='database.positionBatchInterval'>{{ .Values.carku.database.positionBatchInterval }}</entry>
{{- end }}
{{- if .Values.carku.database.positionBatchSize }}
        <entry key='database.positionBatchSize'>{{ .Values.carku.database.positionBatchSize }}</entry>
{{- end }}
{{- end }}

    <!-- GlobalSat formats -->
{{- if .Values.carku.globalsat }}
{{- if .Values.carku.globalsat.format0 }}
        <entry key='globalsat.format0'>{{ .Values.carku.globalsat.format0 }}</entry>
{{- end }}
{{- if .Values.carku.globalsat.format1 }}
        <entry key='globalsat.format1'>{{ .Values.carku.globalsat.format1 }}</entry>
{{- end }}
{{- end }}

    <!-- Coordinates filtering -->
{{- if .Values.carku.coordinates }}
{{- if .Values.carku.coordinates.filter }}
        <entry key='coordinates.filter'>true</entry>
{{- else }}
        <entry key='coordinates.filter'>false</entry>
{{- end }}
{{- if .Values.carku.coordinates.minError }}
        <entry key='coordinates.minError'>{{ .Values.carku.coordinates.minError }}</entry>
{{- end }}
{{- if .Values.carku.coordinates.maxError }}
        <entry key='coordinates.maxError'>{{ .Values.carku.coordinates.maxError }}</entry>
{{- end }}
{{- end }}

    <!-- Event settings -->
{{- if .Values.carku.event }}
{{- if .Values.carku.event.fuelDropThreshold }}
        <entry key='fuelDropThreshold'>{{ .Values.carku.event.fuelDropThreshold }}</entry>
{{- end }}
{{- if .Values.carku.event.fuelIncreaseThreshold }}
        <entry key='fuelIncreaseThreshold'>{{ .Values.carku.event.fuelIncreaseThreshold }}</entry>
{{- end }}
{{- if .Values.carku.event.overspeed }}
{{- if .Values.carku.event.overspeed.thresholdMultiplier }}
        <entry key='event.overspeed.thresholdMultiplier'>{{ .Values.carku.event.overspeed.thresholdMultiplier }}</entry>
{{- end }}
{{- if .Values.carku.event.overspeed.minimalDuration }}
        <entry key='event.overspeed.minimalDuration'>{{ .Values.carku.event.overspeed.minimalDuration }}</entry>
{{- end }}
{{- if .Values.carku.event.overspeed.preferLowest }}
        <entry key='event.overspeed.preferLowest'>true</entry>
{{- else }}
        <entry key='event.overspeed.preferLowest'>false</entry>
{{- end }}
{{- end }}
{{- if .Values.carku.event.behavior }}
{{- if .Values.carku.event.behavior.accelerationThreshold }}
        <entry key='event.behavior.accelerationThreshold'>{{ .Values.carku.event.behavior.accelerationThreshold }}</entry>
{{- end }}
{{- if .Values.carku.event.behavior.brakingThreshold }}
        <entry key='event.behavior.brakingThreshold'>{{ .Values.carku.event.behavior.brakingThreshold }}</entry>
{{- end }}
{{- end }}
{{- if .Values.carku.event.ignoreDuplicateAlerts }}
        <entry key='event.ignoreDuplicateAlerts'>true</entry>
{{- else }}
        <entry key='event.ignoreDuplicateAlerts'>false</entry>
{{- end }}
{{- if .Values.carku.event.status }}
{{- if .Values.carku.event.status.enable }}
        <entry key='event.status.enable'>true</entry>
{{- else }}
        <entry key='event.status.enable'>false</entry>
