{{- if and .Values.h2.enabled .Values.h2.persistence.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "carku.fullname" . }}-data
  labels:
    {{- include "carku.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.h2.persistence.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.h2.persistence.size | quote }}
  {{- if .Values.h2.persistence.storageClass }}
  storageClassName: {{ .Values.h2.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
