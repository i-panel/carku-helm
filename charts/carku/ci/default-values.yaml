# =============================================================================
# Carku GPS Tracking Platform - Default Values
# =============================================================================
# This file contains the default configuration for the Carku Helm chart.
# Most options are commented out; uncomment as needed for your environment.
# For sensitive values (passwords, tokens, keys), use Kubernetes Secrets.
# =============================================================================

# Number of replicas (set >1 for HA mode, requires broadcast configuration)
replicaCount: 1

# Deployment strategy (Recreate for non-HA, RollingUpdate for HA)
deploymentStrategy:
  type: Recreate
  # rollingUpdate:
  #   maxSurge: 25%
  #   maxUnavailable: 25%

# Container image settings
image:
  repository: ghcr.io/carkuhub/carku
  pullPolicy: IfNotPresent
  # Overrides the image tag (defaults to chart appVersion)
  tag: "6.14.5-debian"

# Private registry secrets
imagePullSecrets: []
# - name: ghcr-pull-secret

# Override resource names
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations and labels
podAnnotations: {}
podLabels: {}

# Pod security context
podSecurityContext: {}
# fsGroup: 2000

# Container security context
securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# Init containers (optional)
initContainers: []

# Main container command (Java with memory settings)
command: ["/opt/carku/jre/bin/java", "-Xms512m", "-Xmx512m", "-Djava.net.preferIPv4Stack=true"]
args: ["-jar", "tracker-server.jar", "conf/carku.xml"]

# Environment variables (can reference secrets)
env: []
# - name: CONFIG_USE_ENVIRONMENT_VARIABLES
#   value: "true"

# Ingress for web UI
ingress:
  enabled: false
  extraAnnotations: {}
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  hosts:
    - host: carku.example.com
      paths:
        - /
  tls: []
  # - secretName: carku-tls
  #   hosts:
  #     - carku.example.com

# Internal service (web UI)
service:
  type: ClusterIP
  port: 80    # maps to container port 8082

# External service for device protocols (LoadBalancer)
externalService:
  enabled: false
  type: LoadBalancer
  annotations: {}
  # loadBalancerIP: ""
  # loadBalancerSourceRanges: []
  protocolPorts:
