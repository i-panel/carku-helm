# Resource limits and requests
resources: {}
  # requests:
  #   cpu: 300m
  #   memory: 600Mi

# Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity: {}

# -----------------------------------------------------------------------------
# Database Configuration
# -----------------------------------------------------------------------------
# Choose one of the following databases. MySQL is enabled by default.
mysql:
  enabled: true
  image:
    repository: bitnamilegacy/mysql
  auth:
    database: "carku"
    username: "carku"
    password: "carku"   # Change this! Use secret in production.
  primary:
    persistence:
      enabled: false    # Set to true for production (requires storage class)
  secondary:
    persistence:
      enabled: false

# PostgreSQL / TimescaleDB (optional)
postgresql:
  enabled: false
  auth:
    database: "carku"
    username: "carku"
    password: "carku"
    postgresPassword: "carku-root"
  timescaledb:
    enabled: false
  primary:
    persistence:
      enabled: false

# Embedded H2 database (for testing only, not recommended for production)
h2:
  enabled: false
  path: "./data/carku.db"
  memory: false
  persistence:
    enabled: true
    size: 10Gi

# Redis HA for broadcast clustering (optional)
redis-ha:
  enabled: false

