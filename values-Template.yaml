# values.yaml for carku Helm chart (Complete Version with Bilingual Comments)
# This file contains all configurable parameters for the Carku (Carku) GPS tracking platform.
# تنظیمات کامل نمودار هلم برای کارکو (تراکار) با توضیحات دو زبانه

# =============================================================================
# General Settings / تنظیمات عمومی
# =============================================================================

# configOverride - محتوای کامل فایل config.xml را جایگزین می‌کند (در صورت نیاز)
# configOverride - Completely overrides the generated config.xml content (if needed)
configOverride: ""

# replicaCount - تعداد replicas (نسخه‌های همزمان) پاد. برای حالت High Availability باید بیشتر از 1 باشد و broadcast پیکربندی شود.
# replicaCount - Number of pod replicas. For HA mode, set >1 and configure broadcast.
replicaCount: 1

# deploymentStrategy - استراتژی به‌روزرسانی استقرار
# deploymentStrategy - Deployment update strategy
deploymentStrategy:
  # Recreate - مناسب برای حالت غیر HA (اتصال‌های قدیمی قطع می‌شوند)
  # Recreate - Suitable for non-HA mode (old connections are terminated)
  type: Recreate
  # RollingUpdate - استراتژی به‌روزرسانی تدریجی (برای HA)
  # RollingUpdate - Rolling update strategy (for HA)
  # rollingUpdate:
  #   maxSurge: 25%
  #   maxUnavailable: 25%

# =============================================================================
# Image Settings / تنظیمات ایمیج کانتینر
# =============================================================================

image:
  # repository - مخزن ایمیج (از GitHub Container Registry)
  # repository - Image repository (GitHub Container Registry)
  repository: ghcr.io/i-panel/carku
  # pullPolicy - سیاست کشیدن ایمیج (Always, IfNotPresent, Never)
  # pullPolicy - Image pull policy
  pullPolicy: IfNotPresent
  # flavor - نوع پایه سیستم عامل (alpine, debian, ubuntu)
  # flavor - Base OS flavor (alpine, debian, ubuntu)
  flavor: "alpine"
  # tag - برچسب نسخه (با appVersion چارت هماهنگ شود)
  # tag - Image tag (should match chart appVersion)
  tag: "6.14.1"

# imagePullSecrets - رازهای دسترسی به مخزن خصوصی
# imagePullSecrets - Secrets for private registry access
imagePullSecrets:
  - name: ghcr-pull-secret

# nameOverride - جایگزینی نام چارت (بخش اول نام)
# nameOverride - Override the name of the chart (first part of the name)
nameOverride: ""
# fullnameOverride - جایگزینی نام کامل (کل نام)
# fullnameOverride - Override the full name
fullnameOverride: ""

# =============================================================================
# Service Account / تنظیمات سرویس اکانت Kubernetes
# =============================================================================

serviceAccount:
  # create - آیا سرویس اکانت ایجاد شود؟
  # create - Whether to create a service account
  create: true
  # annotations - حاشیه‌نویس‌های اضافی برای سرویس اکانت
  # annotations - Additional annotations for the service account
  annotations: {}
  # name - نام سرویس اکانت (در صورت خالی و create=true، خودکار ساخته می‌شود)
  # name - Service account name (auto-generated if empty and create=true)
  name: ""

# =============================================================================
# Pod Metadata / فراداده پاد
# =============================================================================

# podAnnotations - حاشیه‌نویس‌های اضافی برای پاد
# podAnnotations - Additional annotations for the pod
podAnnotations: {}
# podLabels - برچسب‌های اضافی برای پاد
# podLabels - Additional labels for the pod
podLabels: {}

# podSecurityContext - زمینه امنیتی سطح پاد (تعیین کاربر/گروه)
# podSecurityContext - Pod-level security context (user/group settings)
podSecurityContext: {}
  # fsGroup: 2000

# securityContext - زمینه امنیتی سطح کانتینر (قابلیت‌ها و مجوزها)
# securityContext - Container-level security context (capabilities and permissions)
securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# initContainers - لیست کانتینرهای اولیه که قبل از کانتینر اصلی اجرا می‌شوند
# initContainers - List of init containers to run before the main container
initContainers: []

# =============================================================================
# Command and Arguments / دستور و آرگومان‌های اجرایی
# =============================================================================

# command - دستور اصلی (جاوا با تنظیمات حافظه)
# command - Main command (Java with memory settings)
command: ["java", "-Xms512m", "-Xmx512m", "-Djava.net.preferIPv4Stack=true"]
# args - آرگومان‌های دستور (فایل JAR و مسیر کانفیگ)
# args - Command arguments (JAR file and config path)
args: ["-jar", "tracker-server.jar", "conf/carku.xml"]

# =============================================================================
# Environment Variables / متغیرهای محیطی (برای بازنویسی تنظیمات)
# =============================================================================
# توجه: برای استفاده از متغیرهای محیطی، CONFIG_USE_ENVIRONMENT_VARIABLES باید true باشد.
# Note: To use environment variables, set CONFIG_USE_ENVIRONMENT_VARIABLES to true.
# تبدیل کلیدهای کانفیگ: نقطه (.) تبدیل به زیرخط (_) و همه حروف بزرگ می‌شوند.
# Conversion: Replace dots (.) with underscores (_) and convert to uppercase.
env: []
# - name: "CONFIG_USE_ENVIRONMENT_VARIABLES"
#   value: "true"
# - name: "DATABASE_USER"
#   valueFrom:
#     secretKeyRef:
#       name: "postgres-secrets"
#       key: "username"
# - name: "DATABASE_PASSWORD"
#   valueFrom:
#     secretKeyRef:
#       name: "postgres-secrets"
#       key: "password"

# =============================================================================
# Ingress / تنظیمات اینگرس (ورودی خارجی برای وب)
# =============================================================================

ingress:
  # enabled - فعال کردن اینگرس (معمولاً با nginx ingress controller)
  # enabled - Enable ingress (typically with nginx ingress controller)
  enabled: false
  # extraAnnotations - حاشیه‌نویس‌های اضافی (مثلاً برای cert-manager)
  # extraAnnotations - Additional annotations (e.g., for cert-manager)
  extraAnnotations: {}
  # annotations - حاشیه‌نویس‌های استاندارد (برای سازگاری)
  # annotations - Standard annotations (for compatibility)
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  # hosts - لیست هاست‌ها و مسیرها
  # hosts - List of hosts and paths
  hosts:
    - host: carku.example.com
      paths:
        - /
  # tls - تنظیمات TLS (گواهی‌نامه)
  # tls - TLS settings (certificates)
  tls: []
  # - secretName: carku-tls
  #   hosts:
  #     - carku.example.com

# =============================================================================
# Internal Service (Web UI) / سرویس داخلی (رابط کاربری وب)
# =============================================================================

service:
  # type - نوع سرویس (ClusterIP برای دسترسی داخلی)
  # type - Service type (ClusterIP for internal access)
  type: ClusterIP
  # port - پورت داخلی که سرویس به آن گوش می‌دهد (به پورت 8082 کانتینر map می‌شود)
  # port - Internal port (maps to container port 8082)
  port: 80

# =============================================================================
# External Service (Device Protocols) / سرویس خارجی (پروتکل‌های دستگاه)
# =============================================================================
# این سرویس برای پذیرش اتصالات دستگاه‌های ردیاب از طریق پورت‌های متعدد استفاده می‌شود.
# This service is used to accept connections from tracking devices on multiple ports.

externalService:
  # enabled - فعال کردن سرویس خارجی (معمولاً LoadBalancer)
  # enabled - Enable external service (typically LoadBalancer)
  enabled: false
  # type - نوع سرویس (LoadBalancer, NodePort, ClusterIP)
  # type - Service type (LoadBalancer, NodePort, ClusterIP)
  type: LoadBalancer
  # annotations - حاشیه‌نویس‌های اضافی (مثلاً برای MetalLB)
  # annotations - Additional annotations (e.g., for MetalLB)
  annotations: {}
    # metallb.universe.tf/loadBalancerIPs: 192.168.1.100
    # protocolPorts - لیست پورت‌های پروتکل‌های مختلف (فقط نمونه، لیست کامل در فایل اصلی موجود است)
    # protocolPorts - List of protocol ports (sample only, full list in original)
  # loadBalancerIP: ""
  # loadBalancerSourceRanges: []

  # -- Enable node port allocation for the external controller service or not. Applies to type `LoadBalancer` only.
