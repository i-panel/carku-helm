# - name: huabao (port 5015) - Java uses jt808
# - name: gpsmaker (port 5057) - Java uses gpsmarker
# - name: granit (port 5112) - Java uses l100
# - name: granit-2 (port 5113) - Java uses granit
# - name: globekeeper (port 5158) - Java uses austinnb
# - name: navtelecom (port 5221) - Java uses maxpb
# - name: omnicom (targetPort only, but name omnicomm matches Java)
# (Other minor targetPort typos like meiliago, sannav, pilgrim are not extra entries but targetPort discrepancies)



# This allows you to provide the entire config from scratch.
# configOverride: |
#   <?xml version='1.0' encoding='UTF-8'?>
#   <!DOCTYPE properties SYSTEM 'http://java.sun.com/dtd/properties.dtd'>
#   <properties>
#       <entry key='config.default'>./conf/default.xml</entry>
#       <entry key='web.enable'>true</entry>
#       <entry key='web.disableHealthCheck'>true</entry>
#       <entry key='....'>....</entry>
#   </properties>


# =============================================================================
# Optimization Settings / تنظیمات بهینه‌سازی
# =============================================================================

optimization:
  # sysctl - تنظیمات هسته لینوکس برای تعداد اتصالات بالا
  # sysctl - Linux kernel settings for high connection count
  sysctl:
    enabled: false
    # vm.max_map_count - محدودیت نقشه‌برداری حافظه (برای جلوگیری از خطای حافظه در تعداد بالای ترد)
    maxMapCount: 250000
    # fs.file-max - حداکثر تعداد فایل‌های باز در کل سیستم
    fileMax: 250000
    # net.ipv4.ip_local_port_range - محدوده پورت‌های محلی برای اتصالات خروجی
    portRange: "1024 65535"

  # ulimit - محدودیت فایل‌های باز برای پردازش جاوا
  # ulimit - Open files limit for Java process
  ulimit:
    enabled: true
    nofile: 50000

# =============================================================================
# Resources and Autoscaling / منابع و مقیاس‌گذاری خودکار
# =============================================================================

# resources - محدودیت‌ها و درخواست‌های منابع CPU/حافظه
# resources - CPU/Memory resource requests and limits
resources:
  limits: {}
  requests:
    cpu: 500m
    memory: 512Mi

# autoscaling - مقیاس‌گذاری خودکار افقی (Horizontal Pod Autoscaler)
# autoscaling - Horizontal Pod Autoscaler configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# =============================================================================
# Node Assignment / تخصیص به نودها
# =============================================================================

# nodeSelector - انتخاب نود بر اساس برچسب‌ها
# nodeSelector - Node selection based on labels
nodeSelector: {}
# tolerations - تحمل‌ها برای نودهای با taint
# tolerations - Tolerations for tainted nodes
tolerations: []
# affinity - قوانین وابستگی (ضد وابستگی) برای استقرار
# affinity - Affinity/anti-affinity rules for scheduling
affinity: {}

# =============================================================================
# Health Probes (Liveness & Readiness) / بررسی‌های سلامت
# =============================================================================

# livenessProbe - بررسی زنده بودن (در صورت شکست، کانتینر ری‌استارت می‌شود)
# livenessProbe - Checks if the container is alive (restarts on failure)
livenessProbe:
  httpGet:
    # path - مسیر API (پاسخ 2xx یعنی سالم)
    # path - API endpoint (2xx response means healthy)
    path: /api/server
    # port - نام پورت تعریف شده در سرویس (http)
    # port - Port name defined in the service (http)
    port: http
  # initialDelaySeconds - تاخیر قبل از اولین بررسی (ثانیه)
  # initialDelaySeconds - Delay before first probe (seconds)
  initialDelaySeconds: 60
  # periodSeconds - فاصله بین بررسی‌ها (ثانیه)
  # periodSeconds - Interval between probes (seconds)
  periodSeconds: 60
  # failureThreshold - تعداد دفعات شکست مجاز قبل از نشانه‌گذاری به عنوان ناسالم
  # failureThreshold - Number of failures allowed before marking as unhealthy
  failureThreshold: 2
  # timeoutSeconds - مهلت پاسخگویی برای هر درخواست (ثانیه)
  # timeoutSeconds - Timeout for each probe request (seconds)
  timeoutSeconds: 1

# readinessProbe - بررسی آمادگی برای پذیرش ترافیک (در صورت شکست، ترافیک به این پاد نمی‌رسد)
# readinessProbe - Checks if the pod is ready to receive traffic
readinessProbe:
  httpGet:
    # path - مسیر API با پارامتر force برای بررسی مستقیم دیتابیس
    # path - API endpoint with force parameter for direct database check
    path: /api/server?force=true
    port: http
  initialDelaySeconds: 60
  periodSeconds: 60
  failureThreshold: 1
  timeoutSeconds: 1

# =============================================================================
# Database Configuration / تنظیمات دیتابیس
# =============================================================================
# شما می‌توانید یکی از گزینه‌های MySQL، PostgreSQL یا H2 را انتخاب کنید.
# You can choose between MySQL, PostgreSQL, or H2 (Embedded).

# 1. MySQL (External Subchart)
mysql:
  enabled: true
  auth:
    database: "carku"
    username: "carku"
    password: "carku"
  primary:
    persistence:
      enabled: false
  ssl:
    enabled: false   # set to true in production
  resources:
      limits: {}
      requests:
        cpu: 300m
        memory: 600Mi

# 2. PostgreSQL & TimescaleDB (External Subchart)
postgresql:
  enabled: false
  auth:
    database: "carku"
    username: "carku"
    password: "carku"
    postgresPassword: "carku-root-password"
  ssl:
    enabled: false
  timescaledb:
    enabled: true
  primary:
  resources:
      limits: {}
      requests:
        cpu: 300m
        memory: 600Mi
    extendedConfiguration: |
      shared_preload_libraries = 'timescaledb'
      timescaledb.max_background_workers = 8
      max_connections = 500
      shared_buffers = 1GB
      effective_cache_size = 3GB
    persistence:
      enabled: true
      size: 20Gi

# 3. H2 (Internal/Embedded Database) - فعال در صورت غیرفعال بودن MySQL و PostgreSQL
# 3. H2 (Internal/Embedded) - Active if both MySQL and PostgreSQL are disabled
h2:
  # enabled - استفاده از دیتابیس داخلی H2
  # enabled - Use internal H2 database
  enabled: false
  # path - مسیر ذخیره‌سازی فایل دیتابیس (در کانتینر)
  # path - Database file storage path (inside container)
  path: "./data/carku.db"
  # memory - اجرای دیتابیس فقط در حافظه (بدون ذخیره روی دیسک - فقط تست)
  # memory - Run database in memory only (volatile - testing only)
  memory: false
  # persistence - تنظیمات ذخیره‌سازی دائمی برای H2
  # persistence - Persistent storage settings for H2
  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 10Gi
    # storageClass: "-"

# =============================================================================
# Redis HA Cluster (for Broadcast) / خوشه Redis با High Availability (برای Broadcast)
# =============================================================================
# در صورت فعال بودن، broadcast.type به "redis" تنظیم می‌شود و broadcast.address مطابق با آدرس haproxy.
# If enabled, broadcast.type will be set to "redis" and broadcast.address to haproxy service.

redis-ha:
  # enabled - فعال کردن خوشه Redis (پیش‌فرض: غیرفعال)
  # enabled - Enable Redis cluster (default: false)
  enabled: false
  persistentVolume:
    # enabled - غیرفعال کردن ذخیره‌سازی پایدار (داده‌ها پس از ری‌استارت از دست می‌روند)
    # enabled - Disable persistent volume (data lost on restart)
    enabled: false
  redis:
    # masterGroupName - نام گروه اصلی Redis Sentinel (برای تشخیص master)
    # masterGroupName - Redis Sentinel master group name
    masterGroupName: carku
  config:
    # save - غیرفعال کردن ذخیره خودکار RDB (رشته خالی یعنی هیچ شرطی)
    # save - Disable automatic RDB snapshots (empty string means no save condition)
    save: '""'
  haproxy:
    # enabled - فعال کردن Haproxy به عنوان لودبالانسر جلوی Redis (دسترسی به سرویس)
    # enabled - Enable Haproxy as load balancer in front of Redis
    enabled: true

# =============================================================================
# Main Carku Configuration (carku.xml) / تنظیمات اصلی کارکو (فایل carku.xml)
# =============================================================================
# این بخش معادل تنظیمات فایل XML برنامه است و به ConfigMap تبدیل می‌شود.
# This section corresponds to the application XML configuration and is converted to ConfigMap.

carku:
  # -------------------------------------------------------------------------
  # Server Settings / تنظیمات سرور (سطح全局)
  # -------------------------------------------------------------------------
  server:
    # bufferingThreshold - آستانه بافر برای ترتیب‌دهی موقعیت‌ها (میلی‌ثانیه). 0 = غیرفعال.
    # bufferingThreshold - Threshold for buffering to order locations (ms). 0 = disabled.
    bufferingThreshold: 3000
    # timeout - زمان اتصال سرور (ثانیه). بسته شدن اتصالات بی‌فعال.
    # timeout - Server connection timeout (seconds). Closes inactive connections.
    timeout: 1800
    # delayAcknowledgement - تأخیر در تأیید دریافت تا بعد از ذخیره در دیتابیس.
    # delayAcknowledgement - Delay acknowledgement until after database write.
    delayAcknowledgement: false
    # nettyBossThreads - تعداد تردهای Netty Boss (0 = پیش‌فرض Netty)
    # nettyBossThreads - Number of Netty boss threads (0 = Netty default)
    nettyBossThreads: 0
    # nettyThreads - تعداد تردهای Netty Worker (0 = پیش‌فرض Netty)
    # nettyThreads - Number of Netty worker threads (0 = Netty default)
    nettyThreads: 0
    # statistics - آدرس ارسال آمار ناشناس (در صورت تمایل به اشتراک‌گذاری)
    # statistics - URL for anonymous statistics upload (optional)
    statistics: "https://www.carku.ir/analytics/"
    # forward - هاست برای ارسال خام داده‌ها (raw data forwarding) به سرور دیگر
    # forward - Host for raw data forwarding to another server
    forward: ""
    # forwardConnectTimeout - Timeout اتصال TCP برای ارسال (میلی‌ثانیه)
    # forwardConnectTimeout - TCP connect timeout for forwarding (ms)
    forwardConnectTimeout: 5000
    # forwardWriteTimeout - Timeout نوشتن TCP برای ارسال (میلی‌ثانیه)
    # forwardWriteTimeout - TCP write timeout for forwarding (ms)
    forwardWriteTimeout: 5000

  # -------------------------------------------------------------------------
  # Web Interface Settings / تنظیمات رابط کاربری وب
  # -------------------------------------------------------------------------
  web:
    # address - آدرس شبکه برای اتصال وب (خالی = همه رابط‌ها)
    # address - Network interface for web binding (empty = all interfaces)
    address: ""
    # port - پورت وب (پیش‌فرض 8082، اما سرویس Kubernetes آن را به 80 map می‌کند)
    # port - Web port (default 8082, but Kubernetes service maps to 80)
    port: 8082
    # path - مسیر فایل‌های وب اپلیکیشن (استاتیک)
    # path - Path to static web app files
    path: "./web"
    # override - مسیر پوشه سفارشی‌سازی (برای برندینگ، لوگوها)
    # override - Path to override folder for branding (logos, etc.)
    override: "./override"
    # debug - نسخه دیباگ وب (فقط برای توسعه، کارایی پایین)
    # debug - Debug version of web app (development only, lower performance)
    debug: false
    # console - فعال کردن کنسول دیتابیس H2 در مسیر /console (فقط دیباگ، هرگز در تولید)
    # console - Enable H2 database console at /console (debug only, never in production)
    console: false
    # timeout - Timeout اتصال WebSocket (میلی‌ثانیه)
    # timeout - WebSocket connection timeout (ms)
    timeout: 300000
    # sessionTimeout - Timeout نشست احراز هویت (ثانیه). خالی = بی‌نهایت.
    # sessionTimeout - Authentication session timeout (seconds). Empty = unlimited.
    sessionTimeout: ""
    # serviceAccountToken - توکن برای حساب ادمین مجازی (بازیابی دسترسی در صورت قفل شدن)
    # serviceAccountToken - Token for virtual admin account (access recovery)
    serviceAccountToken: ""
    # origin - مقدار هدر CORS Origin (برای دسترسی از دامنه دیگر)
    # origin - CORS Origin header value (for cross-domain access)
    origin: ""
    # cacheControl - مقدار هدر Cache-Control (پیش‌فرض: یک ساعت)
    # cacheControl - Cache-Control header value (default: one hour)
    cacheControl: "max-age=3600,public"
    # localizationPath - مسیر فایل‌های ترجمه (زبان‌های مختلف)
    # localizationPath - Path to localization/translation files
    localizationPath: "./templates/translations"
    # requestLogPath - مسیر فایل لاگ درخواست‌های Jetty (شامل الگوی yyyy_mm_dd)
    # requestLogPath - Jetty request log path (must include yyyy_mm_dd pattern)
    requestLogPath: ""
    # requestLogRetainDays - تعداد روز نگهداری لاگ‌های چرخشی (پس از آن حذف شوند)
    # requestLogRetainDays - Days to retain rotated request logs
    requestLogRetainDays: ""
    # disableHealthCheck - غیرفعال کردن health check سیستم‌دی (برای جلوگیری از لاگ‌های اضافی)
    # disableHealthCheck - Disable systemd health checks (to reduce log noise)
    disableHealthCheck: true
    # healthCheckDropThreshold - آستانه کاهش پیام‌ها برای اعلام خطا (0.0 تا 1.0)
    # healthCheckDropThreshold - Drop threshold for health check failure (0.0-1.0)
    healthCheckDropThreshold: ""
    # sameSiteCookie - مقدار SameSite برای کوکی (Lax, Strict, None)
    # sameSiteCookie - SameSite cookie attribute value (Lax, Strict, None)
    sameSiteCookie: ""
    # persistSession - ذخیره نشست‌های Jetty در دیتابیس (برای خوشه‌بندی)
    # persistSession - Persist Jetty sessions to database (for clustering)
    persistSession: false
    # web.url - آدرس عمومی وب اپ (برای نوتیفیکیشن، گزارشات، OpenID)
    # web.url - Public web app URL (for notifications, reports, OpenID)
    url: ""
    # showUnknownDevices - نمایش لاگ دستگاه‌های ناشناس در رابط کاربری
    # showUnknownDevices - Show logs from unknown devices in web UI
    showUnknownDevices: false
    # shareDevice.commands - فعال کردن دستورات برای دستگاه به اشتراک‌گذاشته شده با کاربران دیگر
    # shareDevice.commands - Enable commands for shared devices
    shareDeviceCommands: false
    # shareDevice.reports - فعال کردن گزارشات برای دستگاه به اشتراک‌گذاشته شده
    # shareDevice.reports - Enable reports for shared devices
    shareDeviceReports: false
    # mcp.enable - فعال کردن سرویس MCP (Model Context Protocol) برای AI
    # mcp.enable - Enable MCP service for AI integration
    mcpEnable: false

  # -------------------------------------------------------------------------
  # Geocoder (Reverse Geocoding) / تنظیمات جغرافیای معکوس (تبدیل مختصات به آدرس)
  # -------------------------------------------------------------------------
  geocoder:
    # enable - فعال کردن reverse geocoder
    # enable - Enable reverse geocoding
    enable: true
    # type - نوع سرویس (nominatim, locationiq, google, etc.)
    # type - Geocoder type (nominatim, locationiq, google, etc.)
    type: "nominatim"
    # url - آدرس سرور (برای Nominatim یا Gisgraphy داخلی)
    # url - Server URL (for self-hosted Nominatim or Gisgraphy)
    url: "https://geocoder.carku.ir/reverse"
    # key - کلید API (برای سرویس‌های تجاری مانند Google, LocationIQ)
    # key - API key (for commercial providers like Google, LocationIQ)
    key: ""
    # language - زبان خروجی آدرس (مثلاً fa, en, de)
    # language - Output language (e.g., fa, en, de)
    language: ""
    # format - فرمت آدرس (پیش‌فرض: %h %r, %t, %s, %c)
    # format - Address format (default: %h %r, %t, %s, %c)
    format: ""
    # cacheSize - اندازه کش نتایج geocoding (تعداد آیتم‌ها)
    # cacheSize - Geocoding results cache size (number of items)
    cacheSize: ""
    # ignorePositions - غیرفعال کردن geocoding خودکار برای همه موقعیت‌ها (فقط در صورت درخواست)
    # ignorePositions - Disable automatic geocoding for all positions (on-demand only)
    ignorePositions: true
    # reuseDistance - فاصله کمترین متر برای درخواست مجدد (استفاده از آدرس آخر)
    # reuseDistance - Minimum distance (meters) to request new geocoding (reuse last address)
    reuseDistance: ""
    # onRequest - انجام geocoding در زمان تهیه گزارش و نوتیفیکیشن (نه هنگام ذخیره موقعیت)
    # onRequest - Perform geocoding when preparing reports/notifications (not on save)
    onRequest: true

  # -------------------------------------------------------------------------
  # Geolocation (LBS - Cell Tower & WiFi) / مکان‌یابی مبتنی بر برج سلولی و وای‌فای
  # -------------------------------------------------------------------------
  geolocation:
    # enable - فعال کردن تبدیل اطلاعات سلول/وای‌فای به مختصات (در نبود GPS)
    # enable - Enable cell/WiFi to coordinates conversion (when GPS missing)
    enable: false
    # type - نوع سرویس (google, unwired, opencellid)
    # type - Service type (google, unwired, opencellid)
    type: ""
    # url - آدرس URL سرویس (در صورت نیاز، برای سرویس‌های سفارشی)
    # url - Service URL (if required for custom services)
    url: ""
    # key - کلید API (برای OpenCellID و برخی دیگر)
    # key - API key (for OpenCellID and others)
    key: ""
    # processInvalidPositions - اعمال geolocation به موقعیت‌های نامعتبر (valid=false)
    # processInvalidPositions - Apply geolocation to invalid positions
    processInvalidPositions: false
    # reuse - استفاده مجدد از آخرین نتیجه در صورت عدم تغییر شبکه (ذخیره درخواست)
    # reuse - Reuse last result if network details unchanged (saves requests)
    reuse: false
    # requireWifi - فقط در صورت وجود اطلاعات وای‌فای پردازش کن (دقت بیشتر، اما پوشش کمتر)
    # requireWifi - Process only when Wi-Fi available (better accuracy, lower coverage)
    requireWifi: false
    # mcc - مقدار پیش‌فرض MCC (کد کشور موبایل) در صورت عدم گزارش دستگاه
    # mcc - Default Mobile Country Code if device does not report
    mcc: ""
    # mnc - مقدار پیش‌فرض MNC (کد شبکه موبایل)
    # mnc - Default Mobile Network Code
    mnc: ""

  # -------------------------------------------------------------------------
  # Map Matcher (Snap to Road) / تطابق با نقشه (چسباندن مختصات به جاده)
  # -------------------------------------------------------------------------
  mapMatcher:
    # enable - فعال کردن تطابق با نقشه (موقعیت‌ها روی جاده قرار می‌گیرند)
    # enable - Enable map matching (snap coordinates to roads)
    enable: false
    # type - نوع سرویس (فقط "carku" پشتیبانی می‌شود در نسخه فعلی)
    # type - Provider type (currently only "carku" supported)
    type: "carku"
    # url - آدرس سرویس map matcher (در صورت وجود سرور اختصاصی)
    # url - Map matcher service URL (if self-hosted)
    url: ""
    # key - کلید API سرویس
    # key - API key for the service
    key: ""

  # -------------------------------------------------------------------------
  # Speed Limit API / دریافت محدودیت سرعت از روی نقشه
  # -------------------------------------------------------------------------
  speedLimit:
    # enable - فعال کردن API محدودیت سرعت
    # enable - Enable speed limit API
    enable: false
    # type - نوع سرویس (overpass، یا سایر)
    # type - Service type (overpass, etc.)
    type: "overpass"
    # url - آدرس سرویس (Overpass API یا مشابه)
    # url - Service URL (Overpass API or similar)
    url: ""
    # accuracy - شعاع جستجو برای یافتن جاده نزدیک (متر)
    # accuracy - Search radius to find nearest road (meters)
    accuracy: 100

  # -------------------------------------------------------------------------
  # Position Filtering / فیلتر کردن موقعیت‌های نامعتبر یا تکراری
  # -------------------------------------------------------------------------
  filter:
    # enable - فعال یا غیرفعال کردن فیلتر کلی
    # enable - Enable/disable position filtering globally
    enable: true
    # invalid - فیلتر موقعیت‌های نامعتبر (valid=false)
    # invalid - Filter positions marked as invalid
    invalid: false
    # zero - فیلتر مختصات صفر (0,0) که معمولاً خطا هستند
    # zero - Filter zero coordinates (usually errors)
    zero: false
    # duplicate - فیلتر رکوردهای تکراری بر اساس زمان (یکسان)
    # duplicate - Filter duplicate records by exact time
    duplicate: false
    # outdated - فیلتر پیام‌های بدون موقعیت GPS (استفاده از آخرین موقعیت شناخته شده)
    # outdated - Filter messages without GPS location (use last known)
    outdated: false
    # future - فیلتر موقعیت‌هایی با زمان آینده بیش از N ثانیه (پیش‌فرض 86400 = 1 روز)
    # future - Filter if fix time is more than N seconds in the future
    future: 86400
    # past - فیلتر موقعیت‌هایی با زمان گذشته بیش از N ثانیه (قدیمی)
    # past - Filter if fix time is more than N seconds in the past
    past: ""
    # accuracy - فیلتر موقعیت‌هایی با دقت (خطای تخمینی) کمتر از N متر (دقت بد)
    # accuracy - Filter if accuracy (estimated error) is worse than N meters
    accuracy: ""
    # approximate - فیلتر موقعیت‌های تقریبی حاصل از سلول/وای‌فای (نه GPS)
    # approximate - Filter approximate (cell/WiFi) locations
    approximate: false
    # static - فیلتر موقعیت‌هایی با سرعت صفر دقیق (توقف کامل)
    # static - Filter positions with exactly zero speed
    static: false
    # distance - فیلتر اگر فاصله از موقعیت قبلی کمتر از N متر باشد (کاهش نویز)
    # distance - Filter if distance from previous position is less than N meters
    distance: ""
    # maxSpeed - فیلتر اگر سرعت محاسباتی بین دو موقعیت بیش از N گره باشد (جهش غیرواقعی)
    # maxSpeed - Filter if calculated speed exceeds N knots (unrealistic jumps)
    maxSpeed: ""
    # minPeriod - فیلتر اگر فاصله زمانی از موقعیت قبلی کمتر از N ثانیه باشد (تعدیل)
    # minPeriod - Filter if time from previous position is less than N seconds (throttling)
    minPeriod: ""
    # dailyLimit - محدودیت روزانه تعداد موقعیت‌ها برای هر دستگاه (تعدیل پس از آن)
    # dailyLimit - Daily position limit per device (throttling after limit)
    dailyLimit: ""
    # dailyLimitInterval - فاصله زمانی تعدیل (ثانیه) پس از رسیدن به محدودیت روزانه
    # dailyLimitInterval - Throttling interval (seconds) after daily limit reached
    dailyLimitInterval: ""
    # skipLimit - اگر فاصله زمانی دریافت از آخرین موقعیت بیشتر از N ثانیه باشد، فیلتر اعمال نشود
    # skipLimit - Time limit (seconds) to skip filtering (if gap larger than this)
    skipLimit: ""
    # skipAttributes - ویژگی‌هایی که در صورت وجود، فیلتر رد می‌شود (مثل alarm)
    skipAttributes:
      # enable - فعال کردن رد شدن فیلتر بر اساس وجود ویژگی خاص
      # enable - Enable skipping filter based on attribute presence
      enable: false
      # attributes - لیست ویژگی‌ها (مثلاً alarm, ignition) جدا شده با کاما
      # attributes - Comma-separated attribute names (e.g., alarm,ignition)
      attributes: ""

  # -------------------------------------------------------------------------
  # Distance Calculation / محاسبه مسافت (برای نادیده گرفتن اودومتر دستگاه)
  # -------------------------------------------------------------------------
  distance:
    # enable - فعال کردن محاسبه مسافت توسط سرور (در صورت خطای اودومتر دستگاه)
    # enable - Enable server-side distance calculation (if device odometer is wrong)
    enable: false

  # -------------------------------------------------------------------------
  # Logger / تنظیمات لاگینگ (ثبت رویدادها)
  # -------------------------------------------------------------------------
  logger:
    # level - سطح لاگ: off, severe, warning, info, config, fine, finer, finest, all
    # level - Log level: off, severe, warning, info, config, fine, finer, finest, all
    level: "info"
    # console - خروجی به کنسول (stdout) به جای فایل
    # console - Output to console (stdout) instead of file
    console: false
    # queries - لاگ کردن کوئری‌های SQL اجرا شده (برای دیباگ)
    # queries - Log executed SQL queries (for debugging)
    queries: false
    # fullStackTraces - چاپ کامل استثنائات (به جای خلاصه) - برای دیباگ عمیق
    # fullStackTraces - Print full exception traces (instead of summary) - deep debugging
    fullStackTraces: false
    # decodeTextData - لاگ داده‌های شبکه به صورت متن در صورت قابل چاپ بودن (به جای HEX)
    # decodeTextData - Log network data as text if printable (instead of HEX)
    decodeTextData: true
    # rotateInterval - بازه چرخش لاگ (day یا hour) - نادیده گرفته می‌شود اگر rotate=false
    # rotateInterval - Log rotation interval (day or hour) - ignored if rotate=false
    rotateInterval: "day"
    # attributes - لیست ویژگی‌های موقعیت برای لاگ کردن (کاما جدا شده)
    # attributes - List of position attributes to log (comma-separated)
    attributes: "time,position,speed,course,accuracy,result"

  # -------------------------------------------------------------------------
  # Processing / تنظیمات پردازش پیشرفته موقعیت‌ها
  # -------------------------------------------------------------------------
  processing:
    # remoteAddress.enable - ذخیره آدرس IP دستگاه در موقعیت‌ها
    remoteAddress:
      enable: false
    # useLinkedDriver - استفاده از راننده متصل (در صورت عدم ارسال توسط دستگاه)
    # useLinkedDriver - Use linked driver if device does not send driver ID
    useLinkedDriver: false
    # copyAttributes.enable - کپی کردن ویژگی‌های缺失 از آخرین موقعیت (مثل ignition)
    copyAttributes:
      enable: false
      # attributes - لیست ویژگی‌ها برای کپی (جدا شده با کاما، بدون فاصله)
      # attributes - Comma-separated attribute names to copy (no spaces)
      attributes: ""
    # computedAttributes - ویژگی‌های محاسباتی (عبارات اسکریپتی)
    computedAttributes:
      # deviceAttributes - شامل ویژگی‌های دستگاه در زمینه محاسبه
      # deviceAttributes - Include device attributes in evaluation context
      deviceAttributes: false
      # lastAttributes - شامل ویژگی‌های آخرین موقعیت
      # lastAttributes - Include last position attributes
      lastAttributes: false
      # localVariables - فعال کردن متغیرهای محلی در عبارات
      # localVariables - Enable local variables in expressions
      localVariables: false
      # loops - فعال کردن حلقه‌ها (while, for) در عبارات (ایمنی)
      # loops - Enable loops (while, for) in expressions (security consideration)
      loops: false
      # newInstanceCreation - فعال کردن ایجاد نمونه جدید با new(...) (خطر امنیتی)
      # newInstanceCreation - Enable new instance creation with new(...) (security risk)
      newInstanceCreation: false

  # -------------------------------------------------------------------------
  # Database (Used if mysql.enabled = false) / دیتابیس (در صورت غیرفعال بودن MySQL)
  # -------------------------------------------------------------------------
  database:
    # memory - استفاده از دیتابیس درون حافظه H2 (فقط تست، داده‌ها پس از ری‌استارت از بین می‌رود)
    # memory - Use in-memory H2 database (testing only, data lost on restart)
    memory: false
    # driverFile - مسیر فایل JAR درایور (برای دیتابیس‌های غیر از H2, MySQL, PostgreSQL)
    # driverFile - Path to database driver JAR (for non-built-in databases)
    driverFile: ""
    # driver - کلاس درایور JDBC (مثلاً org.postgresql.Driver)
    # driver - JDBC driver class (e.g., org.postgresql.Driver)
    driver: ""
    # url - آدرس اتصال JDBC کامل
    # url - Full JDBC connection URL
    url: ""
    # user - نام کاربری دیتابیس
    # user - Database username
    user: ""
    # password - رمز عبور دیتابیس
    # password - Database password
    password: ""
    # changelog - مسیر فایل changelog Liquibase (مدیریت schema)
    # changelog - Liquibase changelog file path (schema management)
    changelog: "./schema/changelog-master.xml"
    # maxPoolSize - حداکثر تعداد اتصالات همزمان در پول (HikariCP)
    # maxPoolSize - Maximum number of connections in the pool (HikariCP)
    maxPoolSize: 20
    # checkConnection - کوئری بررسی اتصال (پیش‌فرض SELECT 1)
    # checkConnection - Connection check query (default SELECT 1)
    checkConnection: "SELECT 1"
    # saveOriginal - ذخیره داده خام (HEX یا متن) به عنوان ویژگی "raw" در موقعیت
    # saveOriginal - Save raw data as "raw" attribute in the position
    saveOriginal: false
    # throttleUnknown - کاهش سرعت کوئری‌های دستگاه ناشناس در صورت تکرار زیاد
    # throttleUnknown - Throttle unknown device queries on high frequency
    throttleUnknown: false
    # registerUnknown - ثبت خودکار دستگاه‌های ناشناس در دیتابیس
    # registerUnknown - Automatically register unknown devices in database
    registerUnknown: false
    # registerUnknown.defaultCategory - دسته (category) پیش‌فرض برای دستگاه‌های خودکار
    registerUnknown:
      defaultCategory: ""
      # defaultGroupId - شناسه گروه پیش‌فرض (عدد)
      # defaultGroupId - Default group ID (numeric)
      defaultGroupId: ""
      # regex - فیلتر regex برای تأیید شناسه دستگاه قبل از ثبت خودکار
      # regex - Regex filter to validate device ID before auto-register
      regex: "\\w{3,15}"
    # positionPeriod - محدودیت زمانی برای پرس‌وجوی آخرین موقعیت (ثانیه) - برای TimescaleDB
    # positionPeriod - Time limit for latest position queries (seconds) - for TimescaleDB
    positionPeriod: 7776000
    # saveEmpty - ذخیره پیام‌های خالی (مثل heartbeat) به عنوان موقعیت (با مختصات آخر)
    # saveEmpty - Save empty messages (heartbeats) as positions (with last known location)
    saveEmpty: false
    # maxLifetime - حداکثر عمر اتصال در پول (میلی‌ثانیه) - جلوگیری از اتصالات قدیمی
    # maxLifetime - Maximum connection lifetime in pool (ms) - prevents stale connections
    maxLifetime: ""
    # positionBatchInterval - فاصله زمانی برای دسته‌بندی درج موقعیت‌ها (میلی‌ثانیه) - 0 = غیرفعال
    # positionBatchInterval - Batch insert interval (ms) - 0 = disabled
    positionBatchInterval: 0
    # positionBatchSize - حداکثر تعداد موقعیت در هر دسته (برای بهینه‌سازی)
    # positionBatchSize - Maximum positions per batch (for optimization)
    positionBatchSize: 100

  # -------------------------------------------------------------------------
  # Events / رویدادها (هشدارها و وقایع)
  # -------------------------------------------------------------------------
  event:
    # fuelDropThreshold - آستانه کاهش سوخت برای تولید رویداد (لیتر) - 0 = غیرفعال
    # fuelDropThreshold - Fuel drop threshold (liters) to trigger event - 0 = disabled
    fuelDropThreshold: 0.0
    # fuelIncreaseThreshold - آستانه افزایش سوخت (لیتر) - 0 = غیرفعال
    # fuelIncreaseThreshold - Fuel increase threshold (liters) - 0 = disabled
    fuelIncreaseThreshold: 0.0
    # overspeed - تنظیمات سرعت غیرمجاز
    overspeed:
      # thresholdMultiplier - ضریب آستانه (مثلاً 1.05 برای 5% بالاتر از حد مجاز)
      # thresholdMultiplier - Speed limit multiplier (e.g., 1.05 for 5% above limit)
      thresholdMultiplier: 1.0
      # minimalDuration - حداقل مدت زمان با سرعت غیرمجاز برای تولید رویداد (ثانیه)
      # minimalDuration - Minimal duration of overspeed to trigger event (seconds)
      minimalDuration: ""
      # preferLowest - از پایین‌ترین محدودیت سرعت بین همه حصارهای فعال استفاده کن
      # preferLowest - Use the lowest speed limit from all active geofences
      preferLowest: false
    # behavior - رویدادهای رفتار رانندگی (شتاب ناگهانی، ترمز شدید)
    behavior:
      # accelerationThreshold - آستانه شتاب (متر بر مجذور ثانیه)
      # accelerationThreshold - Acceleration threshold (m/s²)
      accelerationThreshold: ""
      # brakingThreshold - آستانه ترمز (متر بر مجذور ثانیه)
      # brakingThreshold - Braking threshold (m/s²)
      brakingThreshold: ""
    # ignoreDuplicateAlerts - نادیده گرفتن هشدار تکراری در آخرین موقعیت (کاهش نویز)
    # ignoreDuplicateAlerts - Ignore duplicate alerts from last known position (noise reduction)
    ignoreDuplicateAlerts: true
    # status - رویدادهای وضعیت اتصال دستگاه
    status:
      # enable - تولید رویداد deviceOnline/deviceOffline هنگام تغییر وضعیت
      # enable - Generate device connection status events (online/offline)
      enable: false
    # motion - رویداد حرکت (تشخیص حرکت)
    motion:
      # speedThreshold - سرعت آستانه برای تشخیص حرکت (گره، پیش‌فرض 0.01)
      # speedThreshold - Speed threshold for motion detection (knots, default 0.01)
      speedThreshold: 0.01
    # forward - ارسال رویدادها به سرور خارجی (webhook, Kafka, AMQP)
    forward:
      # enable - فعال کردن ارسال رویدادها
      # enable - Enable event forwarding
      enable: false
      # type - فرمت ارسال (json, kafka)
      # type - Forwarding format (json, kafka)
      type: "json"
      # exchange - AMQP exchange (برای RabbitMQ)
      # exchange - AMQP exchange (for RabbitMQ)
      exchange: "carku"
      # topic - Kafka topic یا routing key AMQP
      # topic - Kafka topic or AMQP routing key
      topic: "events"
      # url - آدرس URL برای ارسال HTTP (اگر type=json)
      # url - HTTP endpoint URL (if type=json)
      url: ""
      # header - هدرهای HTTP اضافی (متن چندخطی، کلید: مقدار)
      # header - Additional HTTP headers (multi-line, key: value)
      header: ""

  # -------------------------------------------------------------------------
  # General Parameters / پارامترهای عمومی (متفرقه)
  # -------------------------------------------------------------------------
  # speedLimitGlobal - محدودیت سرعت جهانی (گره) برای همه دستگاه‌ها (در صورت عدم تنظیم جداگانه)
  # speedLimitGlobal - Global speed limit (knots) for all devices (if not overridden)
  speedLimitGlobal: 0.0

  # status - تنظیمات وضعیت آنلاین/آفلاین دستگاه
  status:
    # timeout - مدت زمان بدون داده برای تغییر وضعیت از online به unknown (ثانیه)
    # timeout - Time with no data to change status from online to unknown (seconds)
    timeout: 600
    # ignoreOffline - لیست پروتکل‌هایی که وضعیت آفلاین برای آنها نادیده گرفته شود (مثل پروتکل‌های poll)
    # ignoreOffline - List of protocols to ignore offline status (e.g., polling protocols)
    ignoreOffline: ""

  # media - تنظیمات ذخیره فایل‌های چندرسانه‌ای (عکس، ویدیو، صدا از دستگاه‌ها)
  media:
    # path - مسیر پوشه ذخیره فایل‌ها (زیرپوشه به ازای هر دستگاه ایجاد می‌شود)
    # path - Path to media files storage (subfolders per device created automatically)
    path: "./media"

  # templates - تنظیمات قالب‌های ایمیل و گزارش
  templates:
    # rootPath - ریشه پوشه قالب‌ها (برای ایمیل، گزارشات PDF)
    # rootPath - Root folder for templates (emails, PDF reports)
    rootPath: "templates"

  # users - تنظیمات مربوط به کاربران (ثبت‌نام خودکار، محدودیت‌ها)
  users:
    # defaultDeviceLimit - حداکثر تعداد دستگاه برای کاربران خودثبت‌نام (-1 = بدون محدودیت)
    # defaultDeviceLimit - Device limit for self-registered users (-1 = unlimited)
    defaultDeviceLimit: -1
    # defaultExpirationDays - انقضای پیش‌فرض کاربران خودثبت‌نام (روز) - خالی = بدون انقضا
    # defaultExpirationDays - Default user expiration for self-registered users (days)
    defaultExpirationDays: ""

  # -------------------------------------------------------------------------
  # Position Forwarding (to external systems) / ارسال موقعیت‌ها به سیستم خارجی
  # -------------------------------------------------------------------------
  forward:
    # type - نوع ارسال (url, json, kafka)
    # type - Forward type (url, json, kafka)
    type: "url"
    # exchange - AMQP exchange (برای RabbitMQ)
    # exchange - AMQP exchange (for RabbitMQ)
    exchange: "carku"
    # topic - Kafka topic یا routing key
    # topic - Kafka topic or AMQP routing key
    topic: "positions"
    # url - آدرس URL برای ارسال (پشتیبانی از placeholders: {uniqueId}, {latitude}, {longitude}, {timestamp}, etc.)
    # url - URL for forwarding (supports placeholders: {uniqueId}, {latitude}, {longitude}, etc.)
    url: ""
    # header - هدر HTTP اضافی (برای احراز هویت یا کلید API)
    # header - Additional HTTP header (for authentication or API key)
    header: ""
    # retry - تنظیمات تکرار در صورت شکست ارسال
    retry:
      # enable - فعال کردن تکرار (در صورت عدم دریافت پاسخ 2xx)
      # enable - Enable retries (if 2xx response not received)
      enable: false
      # delay - تأخیر اولیه (میلی‌ثانیه) - هر بار دو برابر می‌شود
      # delay - Initial delay (ms) - doubles each retry
      delay: 100
      # count - حداکثر تعداد تلاش
      # count - Maximum retry attempts
      count: 10
      # limit - حداکثر موقعیت‌های در انتظار (در صورت پر شدن، موقعیت‌های جدید حذف می‌شوند)
      # limit - Pending positions limit (if exceeded, new positions are dropped)
      limit: 100

  # -------------------------------------------------------------------------
  # Mail (SMTP) Settings / تنظیمات ایمیل (ارسال اعلان‌ها و بازیابی رمز)
  # -------------------------------------------------------------------------
  mail:
    # debug - لاگ ایمیل‌ها به جای ارسال واقعی (فقط برای تست)
    # debug - Log emails instead of sending (testing only)
    debug: false
    # transportProtocol - پروتکل انتقال (معمولاً smtp)
    # transportProtocol - Transport protocol (usually smtp)
    transportProtocol: "smtp"
    smtp:
      # systemOnly - محدود کردن استفاده از SMTP فقط به پیام‌های سیستمی (بازیابی رمز، اعلان‌های سرور)
      # systemOnly - Restrict SMTP to system messages only (password reset, server alerts)
      systemOnly: false
      # ignoreUserConfig - اعمال تنظیمات از فایل کانفیگ و نادیده گرفتن ویژگی‌های کاربر (برای یکسان‌سازی)
      # ignoreUserConfig - Force config settings, ignore user attributes (for consistency)
      ignoreUserConfig: false
      # host - سرور SMTP (مثل smtp.gmail.com)
      # host - SMTP server host (e.g., smtp.gmail.com)
      host: ""
      # port - پورت SMTP (معمولاً 25، 465 برای SSL، 587 برای STARTTLS)
      # port - SMTP port (usually 25, 465 for SSL, 587 for STARTTLS)
      port: 25
      # starttls - تنظیمات STARTTLS (ارتقا به TLS پس از اتصال اولیه)
      starttls:
        # enable - فعال کردن STARTTLS
        # enable - Enable STARTTLS
        enable: false
        # required - الزامی بودن STARTTLS (در صورت عدم پشتیبانی سرور، اتصال失败)
        # required - Require STARTTLS (fail if not supported)
        required: false
      # ssl - تنظیمات SSL مستقیم (اتصال از ابتدا با TLS)
      ssl:
        # enable - استفاده از SSL (پورت معمولاً 465)
        # enable - Use SSL (port usually 465)
        enable: false
        # trust - هاست‌های قابل اعتماد ("*" برای همه، یا لیست جدا شده با فاصله)
        # trust - Trusted hosts ("*" for all, or space-separated list)
        trust: ""
        # protocols - پروتکل‌های SSL فعال (مثل "TLSv1.2 TLSv1.3")
        # protocols - Enabled SSL protocols (e.g., "TLSv1.2 TLSv1.3")
        protocols: ""
      # username - نام کاربری (در صورت نیاز به احراز هویت)
      # username - SMTP username (if authentication required)
      username: ""
      # password - رمز عبور
      # password - SMTP password
      password: ""
      # from - آدرس ایمیل فرستنده
      # from - From email address
      from: ""
      # fromName - نام نمایشی فرستنده
      # fromName - From display name
      fromName: ""

  # -------------------------------------------------------------------------
  # SMS Settings / تنظیمات پیامک (ارسال اعلان و فرمان)
  # -------------------------------------------------------------------------
  sms:
    http:
      # url - آدرس کامل API سرویس پیامک (مثل https://api.smsprovider.com/send)
      # url - Full URL of SMS API service
      url: ""
      # authorizationHeader - نام هدر Authorization (پیش‌فرض "Authorization")
      # authorizationHeader - Authorization header name (default "Authorization")
      authorizationHeader: "Authorization"
      # authorization - مقدار هدر Authorization (اولویت با user/password)
      # authorization - Authorization header value (overrides user/password)
      authorization: ""
      # user - نام کاربری برای Basic Auth
      # user - Username for Basic Auth
      user: ""
      # password - رمز عبور برای Basic Auth
      # password - Password for Basic Auth
      password: ""
      # template - قالب بدنه درخواست (JSON یا متن ساده) با placeholders {phone} و {message}
      # template - Request body template with {phone} and {message} placeholders
      template: ""
    aws:
      # access - AWS Access Key ID با مجوز SNS
      # access - AWS Access Key ID with SNS permission
      access: ""
      # secret - AWS Secret Access Key
      # secret - AWS Secret Access Key
      secret: ""
      # region - منطقه AWS (مثل us-east-1)
      # region - AWS region (e.g., us-east-1)
      region: ""

  # -------------------------------------------------------------------------
  # Command Settings / تنظیمات ارسال فرمان (از طریق API خارجی)
  # -------------------------------------------------------------------------
  command:
    client:
      # serviceAccount - محتوای JSON سرویس اکانت Firebase برای ارسال فرمان از طریق FCM
      # serviceAccount - Firebase service account JSON for push commands via FCM
      serviceAccount: ""

  # -------------------------------------------------------------------------
  # Notificator (Notification Manager) / مدیریت اعلان‌ها (پیام به کاربران)
  # -------------------------------------------------------------------------
  notificator:
    # types - انواع اعلان فعال (web, mail, sms, command) - کاما جدا شده
    # types - Enabled notification types (web, mail, sms, command) - comma-separated
    types: "web,mail,command"
    # timeThreshold - آستانه زمانی برای رویدادهای قدیمی (میلی‌ثانیه) - اعلان برای رویدادهای قدیمی‌تر ارسال نمی‌شود
    # timeThreshold - Time threshold for old events (ms) - notifications not sent for older events
    timeThreshold: 900000  # 15 minutes
    # carku - اعلان از طریق سرویس ابری تراکار (در صورت وجود)
    carku:
      # key - کلید API اعلان تراکار
      # key - Carku notification API key
      key: ""
    # firebase - اعلان از طریق Firebase Cloud Messaging (برای اپلیکیشن موبایل)
    firebase:
      # serviceAccount - محتوای JSON سرویس اکانت Firebase
      # serviceAccount - Firebase service account JSON
      serviceAccount: ""
      # mode - حالت تحویل پیام (direct: فقط نمایش، data: فقط داده، mixed: هر دو)
      # mode - Delivery mode (direct: notification only, data: data only, mixed: both)
      mode: "direct"
    # pushover - اعلان از طریق Pushover (سرویس اختصاصی)
    pushover:
      # user - کلید کاربری Pushover
      # user - Pushover user key
      user: ""
      # token - توکن برنامه Pushover
      # token - Pushover application token
      token: ""
    # telegram - اعلان از طریق ربات تلگرام
    telegram:
      # key - توکن ربات تلگرام (از BotFather دریافت کنید)
      # key - Telegram bot token (obtain from BotFather)
      key: ""
      # chatId - شناسه چت (عدد) یا @username کانال
      # chatId - Chat ID (numeric) or channel @username
      chatId: ""
      # sendLocation - ارسال موقعیت جغرافیایی همراه با پیام
      # sendLocation - Send location with message
      sendLocation: false
      # proxyUrl - آدرس پروکسی (در صورت نیاز برای دور زدن تحریم‌ها)
      # proxyUrl - Proxy URL (if needed for network restrictions)
      proxyUrl: ""
    # whatsapp - اعلان از طریق WhatsApp Cloud API
    whatsapp:
      # token - توکن دائمی دسترسی (از Meta Business Platform)
      # token - Permanent access token (from Meta Business Platform)
      token: ""
      # phoneNumberId - شناسه شماره تلفن (در پلتفرم Meta)
      # phoneNumberId - Phone number ID (on Meta platform)
      phoneNumberId: ""
      # templateName - نام قالب پیام (که در پلتفرم Meta تعریف شده)
      # templateName - Template name (defined on Meta platform)
      templateName: ""
      # templateLanguage - کد زبان قالب (پیش‌فرض en_US)
      # templateLanguage - Template language code (default en_US)
      templateLanguage: "en_US"

  # -------------------------------------------------------------------------
  # Notification Expiration / اعلان‌های مربوط به انقضای حساب کاربری یا دستگاه
  # -------------------------------------------------------------------------
  notification:
    expiration:
      # user - فعال کردن اعلان انقضای کاربر
      # user - Enable user expiration notification
      user: false
      # userReminder - مدت زمان قبل از انقضا برای ارسال یادآوری (میلی‌ثانیه)
      # userReminder - Reminder time before expiration (ms)
      userReminder: ""
      # device - فعال کردن اعلان انقضای دستگاه
      # device - Enable device expiration notification
      device: false
      # deviceReminder - مدت زمان قبل از انقضای دستگاه برای یادآوری
      # deviceReminder - Device expiration reminder (ms)
      deviceReminder: ""
    # blockUsers - لیست شناسه‌های کاربرانی که اعلان برایشان مسدود شود (جدا شده با کاما)
    # blockUsers - List of user IDs to block notifications (comma-separated)
    blockUsers: ""

  # -------------------------------------------------------------------------
  # Report Settings / تنظیمات گزارشات (سفرها، توقف‌ها، مسافت)
  # -------------------------------------------------------------------------
  report:
    # periodLimit - حداکثر مدت زمان مجاز برای گزارش (ثانیه) - 0 = بدون محدودیت
    # periodLimit - Maximum allowed report period (seconds) - 0 = unlimited
    periodLimit: ""
    # fastThreshold - آستانه استفاده از گزارش سریع (ثانیه) - گزارش‌های طولانی‌تر با جزئیات کامل
    # fastThreshold - Threshold for fast reports (seconds) - longer reports use full details
    fastThreshold: 86400  # 1 day
    trip:
      # newLogic - استفاده از منطق جدید محاسبه تریپ (پیشنهادی)
      # newLogic - Enable new trip calculation logic (recommended)
      newLogic: true
      # minDistance - حداقل مسافت برای در نظر گرفتن یک تریپ (متر)
      # minDistance - Minimum distance to consider a trip (meters)
      minDistance: 200
      # minDuration - حداقل مدت توقف برای جدا کردن تریپ (ثانیه)
      # minDuration - Minimum stop duration to split trips (seconds)
      minDuration: 180
      # stopGap - شکاف زمانی که به عنوان توقف محسوب می‌شود (ثانیه، پیش‌فرض 3600 = 1 ساعت)
      # stopGap - Time gap treated as stop (seconds, default 3600 = 1 hour)
      stopGap: 3600
      # minimalTripDistance - حداقل مسافت یک تریپ معتبر (متر) - تریپ‌های کوتاه‌تر نادیده گرفته شوند
      # minimalTripDistance - Minimal valid trip distance (meters) - shorter trips ignored
      minimalTripDistance: 500
      # minimalTripDuration - حداقل مدت یک تریپ معتبر (ثانیه)
      # minimalTripDuration - Minimal valid trip duration (seconds)
      minimalTripDuration: 300
      # minimalParkingDuration - حداقل مدت پارکینگ برای عدم تقسیم تریپ (ثانیه)
      # minimalParkingDuration - Minimum parking duration not to split trip (seconds)
      minimalParkingDuration: 300
      # minimalNoDataDuration - شکاف بدون داده که به عنوان توقف حساب شود (ثانیه)
      # minimalNoDataDuration - Gap without data counted as stop (seconds)
      minimalNoDataDuration: 3600
      # useIgnition - استفاده از وضعیت اشتعال (احتراق) در محاسبات تریپ (در صورت وجود)
      # useIgnition - Use ignition status in trip calculation (if available)
      useIgnition: false
    # ignoreOdometer - نادیده گرفتن اودومتر دستگاه و استفاده از مسافت محاسبه‌شده توسط سرور
    # ignoreOdometer - Ignore device odometer, use server-calculated distance
    ignoreOdometer: false

  # -------------------------------------------------------------------------
  # Coordinates Filter / فیلتر مختصات (برای جلوگیری از جهش‌های ناگهانی)
  # -------------------------------------------------------------------------
  coordinates:
    # filter - فعال کردن جایگزینی مختصات با آخرین مختصات در صورت تغییر کمتر از minError یا بیشتر از maxError
    # filter - Replace coordinates with last known if change less than minError or more than maxError
    filter: false
    # minError - حداقل خطای مجاز تغییر (متر) - تغییرات کمتر از این مقدار نادیده گرفته شوند
    # minError - Minimum error distance (meters) - smaller changes ignored
    minError: ""
    # maxError - حداکثر خطای مجاز تغییر (متر) - تغییرات بیشتر از این مقدار نادیده گرفته شوند
    # maxError - Maximum error distance (meters) - larger changes ignored
    maxError: ""

  # -------------------------------------------------------------------------
  # Location Hemisphere Override / جایگزینی نیمکره (برای رفع باگ دستگاه)
  # -------------------------------------------------------------------------
  location:
    # latitudeHemisphere - جایگزینی علامت عرض جغرافیایی (N یا S)
    # latitudeHemisphere - Override latitude hemisphere (N or S)
    latitudeHemisphere: ""
    # longitudeHemisphere - جایگزینی علامت طول جغرافیایی (E یا W)
    # longitudeHemisphere - Override longitude hemisphere (E or W)
    longitudeHemisphere: ""

  # -------------------------------------------------------------------------
  # Time Override / جایگزینی زمان دستگاه
  # -------------------------------------------------------------------------
  time:
    # override - جایگزینی زمان دستگاه (deviceTime یا serverTime)
    # override - Override device time (deviceTime or serverTime)
    override: ""
    # protocols - لیست پروتکل‌هایی که جایگزینی زمان برای آنها اعمال شود (خالی = همه)
    # protocols - List of protocols to apply time override (empty = all)
    protocols: ""

  # -------------------------------------------------------------------------
  # Protocol Selection / انتخاب پروتکل‌های فعال (در صورت تمایل به محدود کردن)
  # -------------------------------------------------------------------------
  protocols:
    # enable - لیست پروتکل‌های فعال (جدا شده با کاما، مثل "teltonika,osmand")
    # enable - List of enabled protocols (comma-separated, e.g., "teltonika,osmand")
    enable: ""

  # -------------------------------------------------------------------------
  # GlobalSat Formats (برای دستگاه‌های GlobalSat با فرمت سفارشی)
  # -------------------------------------------------------------------------
  globalsat:
    # format0 - فرمت سفارشی 0 (پیش‌فرض شامل فیلدهای استاندارد)
    # format0 - Custom format string 0 (default contains standard fields)
    format0: "TSPRXAB27GHKLMnaicz*U!"
    # format1 - فرمت سفارشی 1
    # format1 - Custom format string 1
    format1: "SARY*U!"

  # -------------------------------------------------------------------------
  # Device Manager / تنظیمات مدیریت دستگاه
  # -------------------------------------------------------------------------
  deviceManager:
    # lookupGroupsAttribute - ویژگی مورد استفاده برای جستجوی گروه‌های دستگاه (در پروتکل‌ها)
    # lookupGroupsAttribute - Attribute for device group lookup in protocols
    lookupGroupsAttribute: ""

  # -------------------------------------------------------------------------
  # Wialon Protocol Settings / تنظیمات پروتکل Wialon (تبادل داده با Wialon)
  # -------------------------------------------------------------------------
  wialon:
    # utf8 - استفاده از UTF-8 به جای ASCII برای رمزگشایی متن
    # utf8 - Use UTF-8 instead of ASCII for text decoding
    utf8: false

  # -------------------------------------------------------------------------
  # LDAP Authentication / تنظیمات احراز هویت LDAP (Active Directory, OpenLDAP)
  # -------------------------------------------------------------------------
  ldap:
    # url - آدرس سرور LDAP (مثل ldap://localhost:389 یا ldaps://...)
    # url - LDAP server URL (e.g., ldap://localhost:389 or ldaps://...)
    url: ""
    # user - نام کاربری برای اتصال (bind DN) - معمولاً یک کاربر فقط خواندنی
    # user - Bind username (DN) - usually a read-only user
    user: ""
    # password - رمز عبور
    # password - Bind password
    password: ""
    # force - اجباری کردن احراز هویت LDAP (غیرفعال کردن لاگین داخلی)
    # force - Force LDAP authentication (disable internal login)
    force: false
    # base - جستجوی پایه برای یافتن کاربران (مثلاً ou=users,dc=example,dc=com)
    # base - Search base for users (e.g., ou=users,dc=example,dc=com)
    base: ""
    # idAttribute - ویژگی LDAP که به عنوان شناسه کاربر استفاده می‌شود (پیش‌فرض uid)
    # idAttribute - LDAP attribute used as user ID (default uid)
    idAttribute: "uid"
    # nameAttribute - ویژگی LDAP برای نام نمایشی (پیش‌فرض cn)
    # nameAttribute - LDAP attribute for display name (default cn)
    nameAttribute: "cn"
    # mailAttribute - ویژگی LDAP برای ایمیل (پیش‌فرض mail)
    # mailAttribute - LDAP attribute for email (default mail)
    mailAttribute: "mail"
    # searchFilter - فیلتر جستجوی سفارشی (پیش‌فرض "({idAttribute}=:login)")
    # searchFilter - Custom search filter (default "({idAttribute}=:login)")
    searchFilter: ""
    # adminFilter - فیلتر تشخیص کاربران ادمین (مثلاً "(memberOf=cn=admins,ou=groups,...)")
    # adminFilter - Filter to identify admin users (e.g., "(memberOf=cn=admins,ou=groups,...)")
    adminFilter: ""
    # adminGroup - گروه ادمین (در صورت عدم وجود adminFilter) - نام گروه یا DN
    # adminGroup - Admin group name/DN (if adminFilter not set)
    adminGroup: ""

  # -------------------------------------------------------------------------
  # OpenID Connect (OAuth2 / SSO) / تنظیمات ورود یکپارچه با OpenID Connect
  # -------------------------------------------------------------------------
  openid:
    # clients - لیست کلاینت‌های داخلی (فرمت "clientId:clientSecret:redirectUri" , چندین URI با | جدا می‌شوند)
    # clients - List of built-in clients (format "clientId:clientSecret:redirectUri", multiple URIs with |)
    clients: ""
    # force - اجباری کردن احراز هویت OpenID (عدم نمایش صفحه لاگین داخلی)
    # force - Force OpenID authentication (skip internal login page)
    force: false
    # allowRegistration - اجازه ثبت خودکار کاربران جدید از طریق OpenID حتی اگر ثبت‌نام سرور غیرفعال باشد
    # allowRegistration - Allow auto-creation of new OpenID users even if server registration disabled
    allowRegistration: false
    # clientId - شناسه کلاینت (برای پیکربندی ساده تک کلاینت)
    # clientId - Client ID (for simple single-client setup)
    clientId: ""
    # clientSecret - راز کلاینت
    # clientSecret - Client secret
    clientSecret: ""
    # issuerUrl - آدرس issuer (برای خودپیکربندی discovery)
    # issuerUrl - Issuer URL (for auto-configuration via well-known)
    issuerUrl: ""
    # authUrl - آدرس Authorization Endpoint (در صورت عدم استفاده از issuerUrl)
    # authUrl - Authorization endpoint URL (if not using issuerUrl)
    authUrl: ""
    # tokenUrl - آدرس Token Endpoint
    # tokenUrl - Token endpoint URL
    tokenUrl: ""
    # userInfoUrl - آدرس UserInfo Endpoint
    # userInfoUrl - UserInfo endpoint URL
    userInfoUrl: ""
    # groupsClaimName - نام ادعای (claim) حاوی گروه‌ها (پیش‌فرض groups)
    # groupsClaimName - Claim name for groups (default "groups")
    groupsClaimName: "groups"
    # allowGroup - گروه مجاز برای دسترسی (در صورت وجود، فقط کاربران این گروه می‌توانند وارد شوند)
    # allowGroup - Group allowed to access (if set, only members of this group can log in)
    allowGroup: ""
    # adminGroup - گروه ادمین (کاربران عضو این گروه ادمین می‌شوند)
    # adminGroup - Admin group (members become administrators)
    adminGroup: ""

  # -------------------------------------------------------------------------
  # Broadcast (Clustering) / تنظیمات خوشه‌بندی (برای چندین سرور)
  # -------------------------------------------------------------------------
  # در صورت فعال بودن redis-ha، این تنظیمات نادیده گرفته می‌شوند.
  # If redis-ha is enabled, these settings are overridden.
  broadcast:
    # type - نوع broadcast (multicast, redis) - خالی = غیرفعال
    # type - Broadcast type (multicast, redis) - empty = disabled
    type: ""
    # interface - رابط شبکه برای multicast (آی‌پی یا نام رابط مثل eth0)
    # interface - Network interface for multicast (IP or interface name)
    interface: ""
    # address - آدرس multicast (مثل 230.0.0.1) یا Redis URL (مثل redis://...)
    # address - Multicast address (e.g., 230.0.0.1) or Redis URL
    address: ""
    # port - پورت multicast (مثل 4446)
    # port - Multicast port (e.g., 4446)
    port: ""
    # secondary - علامت سرور ثانویه (برخی وظایف مثل گزارشات زمانبندی شده فقط روی اصلی اجرا شوند)
    # secondary - Mark as secondary server (some tasks like scheduled reports run only on main)
    secondary: false

  # -------------------------------------------------------------------------
  # TOTP (Two-Factor Authentication) / تنظیمات احراز هویت دو مرحله‌ای
  # -------------------------------------------------------------------------
  totp:
    # enable - فعال کردن TOTP در سرور (کاربران می‌توانند تنظیم کنند)
    # enable - Enable TOTP authentication on server (users can set it up)
    enable: false
    # force - اجباری کردن TOTP برای همه کاربران جدید (و نیاز به تنظیم برای کاربران قدیمی)
    # force - Force TOTP for new users (and require existing users to set up)
    force: false

# =============================================================================
# End of values.yaml
